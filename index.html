                        <section className="space-y-3">
                            {renderSectionTitle('risks', '2. 위험성 평가', 'yellow')}
                            {sectionOpen.risks && (
                                <div className="bg-yellow-50 p-4 sm:p-6 rounded-lg border border-yellow-200">
                                    <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-4">
                                        <h3 className="text-lg font-bold text-yellow-800">위험성 평가 입력</h3>
                                        <div className="flex items-center gap-2 rounded-full bg-white border border-yellow-200 p-1">
                                            <button type="button" onClick={() => setForm({ ...form, riskAssessmentDone: true })} className={`px-3 py-1 text-xs rounded-full font-bold ${form.riskAssessmentDone ? 'bg-yellow-500 text-white' : 'text-yellow-800'}`}>실시</button>
                                            <button type="button" onClick={() => setForm({ ...form, riskAssessmentDone: false })} className={`px-3 py-1 text-xs rounded-full font-bold ${!form.riskAssessmentDone ? 'bg-slate-700 text-white' : 'text-slate-600'}`}>미실시</button>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <div className="hidden md:grid grid-cols-12 gap-2 text-xs font-bold text-gray-500 text-center mb-1">
                                            <div className="col-span-1">No</div>
                                            <div className="col-span-3">잠재위험요인</div>
                                            <div className="col-span-3">안전대책</div>
                                            <div className="col-span-2">조치여부</div>
                                            <div className="col-span-2">'아니오' 사유</div>
                                            <div className="col-span-1">관리</div>
                                        </div>
                                        {form.risks.map((risk, idx) => (
                                            <div key={risk.id} className="grid grid-cols-1 md:grid-cols-12 gap-2 items-center bg-white p-3 rounded border border-yellow-100">
                                                <div className="md:col-span-1 text-center font-bold bg-gray-100 rounded-full w-7 h-7 leading-7 mx-auto md:mx-0">{idx+1}</div>
                                                <div className="md:col-span-3">
                                                    <label className="md:hidden block text-xs font-bold text-gray-500 mb-1">잠재위험요인</label>
                                                    <input type="text" className="input-field py-1 text-sm" placeholder="위험요인" value={risk.factor} onChange={e=>updateRisk(risk.id, 'factor', e.target.value)} />
                                                </div>
                                                <div className="md:col-span-3">
                                                    <label className="md:hidden block text-xs font-bold text-gray-500 mb-1">안전대책</label>
                                                    <input type="text" className="input-field py-1 text-sm" placeholder="대책" value={risk.measure} onChange={e=>updateRisk(risk.id, 'measure', e.target.value)} />
                                                </div>
                                                <div className="md:col-span-2">
                                                    <label className="md:hidden block text-xs font-bold text-gray-500 mb-1">조치여부</label>
                                                    <div className="grid grid-cols-2 gap-1 rounded-xl bg-slate-100 p-1">
                                                        <button type="button" onClick={() => updateRisk(risk.id, 'result', 'yes')} className={`px-2 py-2 rounded-lg text-xs font-bold ${(risk.result || 'yes') === 'yes' ? 'bg-emerald-600 text-white shadow-sm' : 'text-slate-600'}`}>예</button>
                                                        <button type="button" onClick={() => updateRisk(risk.id, 'result', 'no')} className={`px-2 py-2 rounded-lg text-xs font-bold ${(risk.result || 'yes') === 'no' ? 'bg-rose-600 text-white shadow-sm' : 'text-slate-600'}`}>아니오</button>
                                                    </div>
                                                </div>
                                                <div className="md:col-span-2">
                                                    <label className="md:hidden block text-xs font-bold text-gray-500 mb-1">'아니오' 사유</label>
                                                    <input type="text" className="input-field py-1 text-xs" placeholder="미조치 사유" value={risk.action || ''} onChange={e=>updateRisk(risk.id, 'action', e.target.value)} disabled={(risk.result || 'yes') === 'yes'} />
                                                </div>
                                                <div className="md:col-span-1 text-center flex md:block gap-1 justify-center">
                                                    <button onClick={()=>duplicateRiskRow(risk.id)} className="text-blue-500 px-2 py-1 border rounded md:border-0 text-xs"><i className="fas fa-clone mr-1 md:mr-0"></i><span className="md:hidden">복제</span></button>
                                                    <button onClick={()=>removeRisk(risk.id)} className="text-red-400 px-2 py-1 border rounded md:border-0 text-xs"><i className="fas fa-times mr-1 md:mr-0"></i><span className="md:hidden">삭제</span></button>
                                                </div>
                                            </div>
                                        ))}
                                        <button onClick={addRiskRow} className="w-full py-2 border-2 border-dashed border-gray-300 text-gray-500 rounded text-sm hover:bg-white">+ 위험요인 추가</button>
                                    </div>
                                    <div className="mt-4"><label className="label-text text-red-600 font-bold">중점 위험요인 선택</label><select className="input-field" value={form.keyRiskId} onChange={e=>setForm({...form, keyRiskId: e.target.value})}><option value="">선택하세요</option>{form.risks.map((r,i)=>(<option key={r.id} value={r.id}>{i+1}. {r.factor}</option>))}</select></div>
                                </div>
                            )}
                        </section>

                        <section className="space-y-3">
                            {renderSectionTitle('checks', '3. 안전점검 및 점검결과')}
                            {sectionOpen.checks && (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 border border-gray-100 rounded-lg p-4">
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-700 mb-4 border-b pb-2">작업 전 안전 점검 (Checklist)</h3>
                                        <div ref={briefingDoneRef} className="mb-4 p-3 border rounded bg-blue-50 border-blue-200">
                                            <div className="text-sm font-bold text-blue-900 mb-2">작업 전 공유/교육 실시 여부</div>
                                            <div className="flex items-center gap-4">
                                                <label className="flex items-center gap-1 text-sm">
                                                    <input
                                                        type="radio"
                                                        name="preJobBriefingDone"
                                                        checked={form.preJobBriefingDone === true}
                                                        onChange={() => setForm({ ...form, preJobBriefingDone: true, preJobBriefingAction: '' })}
                                                    />
                                                    예
                                                </label>
                                                <label className="flex items-center gap-1 text-sm">
                                                    <input
                                                        type="radio"
                                                        name="preJobBriefingDone"
                                                        checked={form.preJobBriefingDone === false}
                                                        onChange={() => setForm({ ...form, preJobBriefingDone: false })}
                                                    />
                                                    아니오
                                                </label>
                                            </div>
                                            {form.preJobBriefingDone === false && (
                                                <div className="mt-2">
                                                    <label className="label-text text-red-600">미실시 사유 + 즉시조치 (필수)</label>
                                                    <input
                                                        ref={briefingActionRef}
                                                        type="text"
                                                        className="input-field"
                                                        placeholder="예: 인원 미집결로 즉시 재소집 후 공유 완료"
                                                        value={form.preJobBriefingAction || ''}
                                                        onChange={(e) => setForm({ ...form, preJobBriefingAction: e.target.value })}
                                                    />
                                                </div>
                                            )}
                                        </div>
                                        <div className="space-y-2 mb-6">
                                            <label className="flex items-center p-2 border rounded bg-white"><input type="checkbox" className="mr-2" checked={form.preChecks.check1} onChange={e=>setForm({...form, preChecks:{...form.preChecks, check1:e.target.checked}})} />보호구 착용</label>
                                            <label className="flex items-center p-2 border rounded bg-white"><input type="checkbox" className="mr-2" checked={form.preChecks.check2} onChange={e=>setForm({...form, preChecks:{...form.preChecks, check2:e.target.checked}})} />장비 점검</label>
                                            <label className="flex items-center p-2 border rounded bg-white"><input type="checkbox" className="mr-2" checked={form.preChecks.check3} onChange={e=>setForm({...form, preChecks:{...form.preChecks, check3:e.target.checked}})} />건강 상태</label>
                                        </div>
                                        <h3 className="text-lg font-bold text-gray-700 mb-4 border-b pb-2">작업 전 일일 안전점검 시행 결과</h3>
                                        <textarea className="input-field h-[184px]" placeholder="특이사항 없음" value={form.dailyCheckResult} onChange={e=>setForm({...form, dailyCheckResult:e.target.value})}></textarea>
                                    </div>
                                    <div>
                                        <h3 className="text-lg font-bold text-gray-700 mb-3 border-b pb-2">6. TBM 활동 사진 첨부</h3>
                                        <div className="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition relative">
                                            <input type="file" accept="image/*" onChange={handlePhotoUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                            {form.photoUrl ? (
                                                <div className="space-y-3">
                                                    <img src={form.photoUrl} alt="Preview" className="max-h-32 mx-auto rounded shadow" />
                                                    <div className="flex flex-wrap justify-center gap-2">
                                                        <button type="button" onClick={() => setForm(prev => ({ ...prev, photoUrl: '' }))} className="px-3 py-1.5 text-xs border border-red-200 text-red-600 rounded-lg bg-white hover:bg-red-50 relative z-10">
                                                            사진 삭제
                                                        </button>
                                                        <span className="text-xs text-gray-400 self-center">다시 클릭하면 새 사진으로 교체됩니다.</span>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="text-gray-400"><i className="fas fa-camera text-3xl mb-2"></i><br/>클릭하여 사진 촬영/업로드</div>
                                            )}
                                        </div>
                                        <div className="mt-2 text-xs text-gray-400">현장 사진은 압축 후 저장됩니다. 흐린 사진은 다시 촬영하는 편이 좋습니다.</div>
                                    </div>
                                </div>
                            )}
                        </section>

                        <section className="space-y-3">
                            {renderSectionTitle('attendees', `4. 참석자 (${form.attendees.length}명)`)}
                            {sectionOpen.attendees && (
                                <div className="border border-gray-100 rounded-lg p-4">
                                    <div className="text-xs text-indigo-700 bg-indigo-50 border border-indigo-200 rounded p-2 mb-3">
                                        참석자 이름은 모두 기록하고, 서명은 리더 1명만 받습니다. 일반 참석자는 대표자 확인으로 서명을 생략합니다.
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded h-48 overflow-y-auto space-y-2 mb-3">
                                        {form.attendees.map((att, idx) => (
                                            <div key={idx} className="flex items-center gap-2 bg-white p-2 rounded border shadow-sm">
                                                <div className={`w-12 shrink-0 text-center px-1 py-1 rounded text-xs font-bold ${att.isLeader ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'}`}>
                                                    {att.isLeader ? '리더' : '참석'}
                                                </div>
                                                <input
                                                    ref={att.isLeader ? leaderNameRef : null}
                                                    type="text"
                                                    placeholder={att.isLeader ? "리더 이름" : "참석자 이름"}
                                                    className="border border-gray-300 rounded px-3 py-2 text-sm w-20 sm:w-28 md:w-32 shrink-0 text-center font-bold outline-none focus:ring-2 focus:ring-indigo-500 h-12"
                                                    value={att.name}
                                                    onChange={e=>updateAttendee(idx, e.target.value)}
                                                    disabled={att.signed}
                                                />
                                                <div
                                                    ref={att.isLeader ? leaderSignatureRef : null}
                                                    onClick={() => att.isLeader && !att.signed && openSignModal(idx)}
                                                    className={`flex-1 min-w-0 h-12 border rounded flex items-center justify-center transition ${att.isLeader ? (att.signed ? 'bg-white border-indigo-500 cursor-pointer' : 'bg-gray-50 border-dashed hover:bg-indigo-50 cursor-pointer') : 'bg-slate-50 border-slate-200 cursor-not-allowed text-slate-400'}`}
                                                >
                                                    {att.signed && att.signatureUrl ? <img src={att.signatureUrl} alt="서명" className="h-full object-contain" /> : <span className={`text-sm font-bold whitespace-nowrap ${att.isLeader ? 'text-gray-400' : 'text-slate-400'}`}><i className="fas fa-file-signature mr-1"></i>{att.isLeader ? '리더 서명(필수)' : '대표자 확인으로 생략'}</span>}
                                                </div>
                                                {!att.isLeader && (
                                                    <button onClick={() => removeAttendee(idx)} className="w-8 h-8 shrink-0 flex items-center justify-center text-red-400 hover:text-red-600 hover:bg-red-50 rounded-full transition" title="참석자 삭제">
                                                        <i className="fas fa-minus-circle"></i>
                                                    </button>
                                                )}
                                            </div>
                                        ))}
                                        <button onClick={addAttendee} className="w-full py-2 bg-indigo-50 text-indigo-600 font-bold rounded text-sm hover:bg-indigo-100">+ 참석자 추가(선택)</button>
                                    </div>
                                </div>
                            )}
                        </section>

                        <div className="sticky bottom-0 bg-white/95 backdrop-blur border-t pt-3 pb-[calc(env(safe-area-inset-bottom,0px)+0.25rem)] flex flex-col-reverse sm:flex-row justify-end gap-3 sm:gap-4">
                            <button onClick={()=>setView('list')} disabled={submitting} className="w-full sm:w-auto min-h-12 px-6 py-3 border rounded-xl disabled:opacity-50 text-base font-bold">취소</button>
                            <button onClick={handleSubmit} disabled={submitting} className={`w-full sm:w-auto min-h-12 px-8 py-3 text-white rounded-xl text-base font-bold shadow-lg ${submitting ? 'bg-indigo-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                {submitting ? <><i className="fas fa-spinner fa-spin mr-2"></i>저장 중...</> : '저장'}
                            </button>
                        </div>
                    </div>
                    <SignatureModal
                        isOpen={showSignModal}
                        onClose={() => {
                            setShowSignModal(false);
                            setCurrentSignerIndex(null);
                        }}
                        onSave={handleSaveSignature}
                        signerName={currentSignerIndex !== null ? (form.attendees[currentSignerIndex]?.name || '') : ''}
                    />
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null); 
            const [view, setView] = useState('login'); 
            const [loading, setLoading] = useState(true);
            const [toast, setToast] = useState(null);
            const [tbms, setTbms] = useState([]);
            const [accounts, setAccounts] = useState([]);
            const [currentYear, setCurrentYear] = useState('2026'); // Default 2026
            const [availableYears, setAvailableYears] = useState(['2026']); // Default Only 2026
            const [loginId, setLoginId] = useState('');
            const [loginPw, setLoginPw] = useState('');
            const [saveId, setSaveId] = useState(false);
            const [editTbmData, setEditTbmData] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            
            // PDF Generation State
            const [downloadingPdf, setDownloadingPdf] = useState(false);
            const [targetPdfTbm, setTargetPdfTbm] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('savedId');
                if (saved) { setLoginId(saved); setSaveId(true); }

                let unsubUsers = null;
                let unsubTbms = null;
                let mounted = true;

                const init = async () => {
                    try {
                        await signInAnonymously(auth);

                        // Fetch System Config
                        const configDoc = await getDoc(doc(db, "system_settings", "config"));
                        if (mounted && configDoc.exists()) {
                            setAvailableYears(configDoc.data().years || ['2026']);
                        }

                        // --- Sort Logic Applied Here (Global) ---
                        unsubUsers = onSnapshot(
                            query(collection(db, "app_users")),
                            (s) => {
                                if (!mounted) return;
                                const fetchedAccounts = s.docs.map(d => ({id:d.id, ...d.data()}));
                                fetchedAccounts.sort((a, b) => {
                                    const deptA = a.department || '';
                                    const deptB = b.department || '';
                                    return deptA.localeCompare(deptB, 'ko');
                                });
                                setAccounts(fetchedAccounts);
                            },
                            (err) => {
                                console.error("app_users 구독 실패:", err);
                                if (mounted) setToast({ message: "계정 데이터 구독 실패", type: "error" });
                            }
                        );

                        unsubTbms = onSnapshot(
                            query(collection(db, "global_tbm_data"), orderBy("createdAt", "desc")),
                            (s) => {
                                if (!mounted) return;
                                setTbms(s.docs.map(d => ({id:d.id, ...d.data()})));
                                setLoading(false);
                            },
                            (err) => {
                                console.error("global_tbm_data 구독 실패:", err);
                                if (mounted) {
                                    setToast({ message: "TBM 데이터 구독 실패", type: "error" });
                                    setLoading(false);
                                }
                            }
                        );
                    } catch (err) {
                        console.error("초기화 실패:", err);
                        if (mounted) {
                            setToast({ message: "초기화 중 오류가 발생했습니다.", type: "error" });
                            setLoading(false);
                        }
                    }
                };
                init();

                return () => {
                    mounted = false;
                    if (typeof unsubUsers === 'function') unsubUsers();
                    if (typeof unsubTbms === 'function') unsubTbms();
                };
            }, []);

            const showToast = (msg, type = 'info') => setToast({ message: msg, type });

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                if (saveId) localStorage.setItem('savedId', loginId);
                else localStorage.removeItem('savedId');

                try {
                    // 운영 연속성: master 계정이 아직 없을 때만 임시 관리자 로그인 허용
                    if (loginId === 'admin' && loginPw === '0908') {
                        const realMaster = accounts.find(a => a.role === 'master');
                        if (!realMaster || accounts.length === 0) {
                            setUser({ id: 'temp_master', username: 'Master Admin', role: 'master', department: '경영기획팀' });
                            setView('dashboard');
                            showToast('관리자로 로그인했습니다.', 'success');
                            return;
                        }
                    }

                    const normalizedLoginId = String(loginId || '').trim();
                    const foundUser = accounts.find(a => String(a.username || '').trim() === normalizedLoginId);
                    if (!foundUser) {
                        showToast('정보 불일치', 'error');
                        return;
                    }

                    const ok = await verifyPassword(loginPw, foundUser);
                    if (!ok) {
                        showToast('정보 불일치', 'error');
                        return;
                    }

                    // Legacy plain-password account is upgraded to hash after successful login.
                    if (!foundUser.passwordHash && typeof foundUser.password === 'string') {
                        const passwordHash = await hashPassword(loginPw);
                        await updateDoc(doc(db, "app_users", foundUser.id), {
                            passwordHash,
                            updatedAt: new Date().toISOString()
                        });
                    }

                    setUser(foundUser);
                    setView('dashboard');
                    showToast('로그인 성공', 'success');
                } catch (err) {
                    console.error("로그인 처리 실패:", err);
                    showToast('로그인 처리 중 오류', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const canManageTbm = (tbm) => {
                if (!user || !tbm) return false;
                return user.role === 'master' || tbm.department === user.department;
            };

            const handleEditTbm = (tbm) => {
                if (!canManageTbm(tbm)) {
                    showToast('해당 TBM을 수정할 권한이 없습니다.', 'error');
                    return;
                }
                setEditTbmData(tbm);
                setView('write');
            };

            const handleDeleteTbm = async (id) => {
                const target = tbms.find(t => t.id === id);
                if (!canManageTbm(target)) {
                    showToast('해당 TBM을 삭제할 권한이 없습니다.', 'error');
                    return;
                }
                if(confirm("정말 삭제하시겠습니까?")) {
                    await deleteDoc(doc(db, "global_tbm_data", id));
                    showToast("삭제 완료", "success");
                }
            };
            
            const handlePdfDownload = (tbm) => {
                if (user?.role !== 'master') {
                    showToast('PDF 다운로드는 관리자만 사용할 수 있습니다.', 'error');
                    return;
                }
                showToast("PDF 생성을 시작합니다...", "info");
                setTargetPdfTbm(tbm);
                setDownloadingPdf(true);
            };

            const handlePdfComplete = (result) => {
                setDownloadingPdf(false);
                setTargetPdfTbm(null);
                if (result?.ok) {
                    showToast("PDF 다운로드가 완료되었습니다.", "success");
                } else {
                    showToast("PDF 생성에 실패했습니다. 이미지/글꼴 상태를 확인해 주세요.", "error");
                }
            };

            const handleLogout = () => { setUser(null); setView('login'); setLoginId(''); setLoginPw(''); setMobileMenuOpen(false); };

            const myTbms = useMemo(() => {
                if (!user) return [];
                const filtered = tbms.filter(t => t.date.startsWith(currentYear));
                if (user.role === 'master') return filtered;
                return filtered.filter(t => t.department === user.department);
            }, [tbms, user, currentYear]);

            const todayQueue = useMemo(() => {
                const today = getLocalDateInputValue();
                return myTbms
                    .filter(t => t.date === today)
                    .map(t => ({ ...t, badge: '오늘 작업', meta: `${t.location || '-'} · 참석자 ${t.attendees?.length || 0}명` }));
            }, [myTbms]);

            const riskQueue = useMemo(() => {
                return myTbms
                    .filter(t => (t.risks || []).some(r => (r.result || 'yes') === 'no'))
                    .map(t => ({
                        ...t,
                        badge: '조치 필요',
                        meta: (t.risks || [])
                            .filter(r => (r.result || 'yes') === 'no')
                            .map(r => `• ${r.factor}${r.action ? ` - ${r.action}` : ''}`)
                            .join('\n')
                    }));
            }, [myTbms]);

            const draftItems = useMemo(() => {
                if (!user) return [];
                try {
                    const raw = localStorage.getItem(`tbm_draft_${user.department}`);
                    if (!raw) return [];
                    const draft = JSON.parse(raw);
                    return [{
                        date: draft.date || getLocalDateInputValue(),
                        department: user.department,
                        workName: draft.workName || '임시저장 문서',
                        leader: (draft.attendees || []).find(att => att.isLeader)?.name || user.username || '-',
                        badge: '임시저장',
                        meta: `장소: ${draft.location || '-'}\n위험요인 ${(draft.risks || []).filter(r => String(r.factor || '').trim()).length}건 입력`
                    }];
                } catch {
                    return [];
                }
            }, [user]);

            const stats = useMemo(() => {
                const yearTbms = tbms.filter(t => t.date.startsWith(currentYear));
                const total = yearTbms.length;
                const safeCount = yearTbms.filter(t => t.riskAssessmentDone).length;
                const monthlyData = Array.from({length: 12}, (_, i) => ({ label: `${i+1}월`, value: 0 }));
                yearTbms.forEach(t => {
                    if(t.date) monthlyData[new Date(t.date).getMonth()].value++;
                });
                return { total, safeCount, monthlyData: monthlyData }; // REMOVED SLICE
            }, [tbms, currentYear]);

            if (loading && !user && view !== 'login') return <div className="h-screen flex items-center justify-center flex-col"><i className="fas fa-circle-notch fa-spin text-4xl text-indigo-600 mb-4"></i><p>Loading...</p></div>;

            return (
                <div className="flex h-[100dvh] overflow-hidden">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    
                    {/* Hidden PDF Generator */}
                    {downloadingPdf && targetPdfTbm && (
                        <PdfHiddenGenerator tbm={targetPdfTbm} onComplete={handlePdfComplete} />
                    )}

                    {view === 'login' ? (
                        <div className="w-full"><LoginView loginId={loginId} setLoginId={setLoginId} loginPw={loginPw} setLoginPw={setLoginPw} handleLogin={handleLogin} saveId={saveId} setSaveId={setSaveId} loading={loading} /></div>
                    ) : (
                        <>
                            <div className="md:hidden fixed top-0 left-0 right-0 z-30 h-14 bg-slate-950/92 backdrop-blur-2xl border-b border-white/8 px-3 flex items-center justify-between shadow-[0_12px_24px_rgba(2,6,23,0.24)]">
                                <button onClick={() => setMobileMenuOpen(true)} className="w-9 h-9 rounded-xl border border-white/10 text-white bg-white/6">
                                    <i className="fas fa-bars"></i>
                                </button>
                                <div className="display-title font-bold text-white text-sm"><i className="fas fa-hard-hat mr-1 text-sky-300"></i>스마트 TBM</div>
                                <button onClick={handleLogout} className="w-9 h-9 rounded-xl border border-white/10 text-white/76 bg-white/6">
                                    <i className="fas fa-sign-out-alt"></i>
                                </button>
                            </div>
                            {mobileMenuOpen && (
                                <div className="md:hidden fixed inset-0 bg-black/35 z-30" onClick={() => setMobileMenuOpen(false)}></div>
                            )}
                            <Sidebar
                                user={user}
                                view={view}
                                setView={(v) => { if(v==='write') setEditTbmData(null); setView(v); }}
                                handleLogout={handleLogout}
                                mobileMenuOpen={mobileMenuOpen}
                                setMobileMenuOpen={setMobileMenuOpen}
                            />
                            <main className="flex-1 md:ml-64 p-4 sm:p-6 md:p-8 overflow-y-auto h-[100dvh] pt-[4.5rem] md:pt-8 app-main">
                                {view === 'dashboard' && <DashboardView stats={stats} tbms={tbms} currentYear={currentYear} setCurrentYear={setCurrentYear} allTbms={tbms} availableYears={availableYears} />}
                                {view === 'today' && <ActionQueueView title="오늘 작업" subtitle="오늘 날짜로 작성된 TBM을 빠르게 확인합니다" items={todayQueue} emptyMessage="오늘 등록된 작업이 없습니다." accent="sky" onEdit={handleEditTbm} onPdfDownload={handlePdfDownload} user={user} setView={setView} />}
                                {view === 'risks' && <ActionQueueView title="미조치 위험요인" subtitle="조치여부가 '아니오'인 위험요인을 모아봅니다" items={riskQueue} emptyMessage="현재 미조치 위험요인이 없습니다." accent="rose" onEdit={handleEditTbm} onPdfDownload={handlePdfDownload} user={user} setView={setView} />}
                                {view === 'drafts' && <ActionQueueView title="임시저장 문서" subtitle="자동 저장된 작성 중 문서를 이어서 확인합니다" items={draftItems} emptyMessage="현재 임시저장된 문서가 없습니다." accent="amber" onEdit={() => setView('write')} onPdfDownload={handlePdfDownload} user={user} setView={setView} />}
                                {view === 'list' && (
                                    <ListView 
                                        user={user} 
                                        myTbms={myTbms} 
                                        setView={(v) => { if(v==='write') setEditTbmData(null); setView(v); }} 
                                        accounts={accounts} 
                                        allTbms={tbms} 
                                        currentYear={currentYear} 
                                        setCurrentYear={setCurrentYear} 
                                        onEdit={handleEditTbm} 
                                        onDelete={handleDeleteTbm} 
                                        onPdfDownload={handlePdfDownload}
                                        availableYears={availableYears}
                                    />
                                )}
                                {view === 'write' && <TBMFormView user={user} setView={setView} showToast={showToast} setLoading={setLoading} initialData={editTbmData} />}
                                {view === 'admin' && <AdminView user={user} accounts={accounts} showToast={showToast} />}
                                {view === 'settings' && <SettingsView availableYears={availableYears} setAvailableYears={setAvailableYears} />}
                            </main>
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
        
        // Dynamic Style for animation
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            .app-main {
                background:
                    radial-gradient(760px 320px at 0% 0%, rgba(37,99,235,0.10), transparent 60%),
                    radial-gradient(760px 320px at 100% 0%, rgba(148,163,184,0.08), transparent 58%),
                    linear-gradient(180deg, #f8fbff 0%, #f4f7fc 100%);
            }
            .input-field {
                width: 100%;
                border: 1px solid #d5dfeb;
                border-radius: 0.95rem;
                padding: 0.72rem 0.92rem;
                background:
                    linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,252,255,0.98));
                outline: none;
                color: #172033;
                transition: border-color 0.2s, box-shadow 0.2s, background 0.2s, transform 0.2s;
            }
            .input-field:focus {
                border-color: #2563eb;
                box-shadow: 0 0 0 4px rgba(37,99,235,0.12), 0 8px 20px rgba(37,99,235,0.06);
                background: #ffffff;
                transform: translateY(-1px);
            }
            .label-text {
                display: block;
                font-size: 0.82rem;
                font-weight: 800;
                color: #3a4a63;
                margin-bottom: 0.4rem;
                letter-spacing: -0.02em;
            }
            .bg-white, .bg-white\\/95 {
                box-shadow: 0 12px 28px rgba(15, 23, 42, 0.05);
            }
            @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
            @keyframes bounceIn { 0% { transform: scale(0.9); opacity: 0; } 70% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
            .animate-bounce-in { animation: bounceIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
            @keyframes softFloat { 0% { transform: translateY(10px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
            .animate-soft-float { animation: softFloat 0.45s ease-out both; }
            @keyframes modalRise { 0% { transform: translateY(18px) scale(0.98); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
            .animate-modal-rise { animation: modalRise 0.26s ease-out both; }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
