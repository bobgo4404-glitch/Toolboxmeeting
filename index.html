        };

        const AdminView = ({ accounts, showToast }) => {
            const [newAcc, setNewAcc] = useState({ username: '', password: '', department: '생산팀', role: 'user' });
            const [editingId, setEditingId] = useState(null);
            const [newPassword, setNewPassword] = useState('');

            const handleCreateAccount = async () => {
                if(!newAcc.username || !newAcc.password) return showToast('정보를 입력하세요', 'error');
                try {
                    const passwordHash = await hashPassword(newAcc.password);
                    await addDoc(collection(db, "app_users"), {
                        username: newAcc.username.trim(),
                        department: newAcc.department.trim(),
                        role: newAcc.role,
                        passwordHash,
                        updatedAt: new Date().toISOString()
                    });
                    showToast('계정이 생성되었습니다.', 'success');
                    setNewAcc({ username: '', password: '', department: '생산팀', role: 'user' });
                } catch(e) { showToast('생성 실패', 'error'); }
            };
            const handleDeleteAccount = async (id) => { if(confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, "app_users", id)); };
            const handleUpdatePassword = async (id) => {
                if(!newPassword) return;
                const passwordHash = await hashPassword(newPassword);
                await updateDoc(doc(db, "app_users", id), { passwordHash, updatedAt: new Date().toISOString() });
                showToast('비밀번호 변경 완료', 'success');
                setEditingId(null);
            };

            // Explicit sort for rendering
            const sortedAccounts = [...accounts].sort((a, b) => (a.department || '').localeCompare(b.department || '', 'ko'));

            return (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fade-in-up">
                    <div className="lg:col-span-1 bg-white p-6 rounded-xl shadow h-fit">
                        <h3 className="font-bold text-lg mb-4 text-gray-800">새 계정 생성</h3>
                        <div className="space-y-4">
                            <input type="text" className="input-field" placeholder="아이디" value={newAcc.username} onChange={e=>setNewAcc({...newAcc, username: e.target.value})} />
                            <input type="password" className="input-field" placeholder="비밀번호" value={newAcc.password} onChange={e=>setNewAcc({...newAcc, password: e.target.value})} />
                            <input type="text" className="input-field" placeholder="부서명" value={newAcc.department} onChange={e=>setNewAcc({...newAcc, department: e.target.value})} />
                            <select className="input-field" value={newAcc.role} onChange={e=>setNewAcc({...newAcc, role: e.target.value})}>
                                <option value="user">User</option>
                                <option value="master">Master</option>
                            </select>
                            <button onClick={handleCreateAccount} className="w-full bg-pink-600 text-white py-2 rounded font-bold hover:bg-pink-700 transition">계정 생성</button>
                        </div>
                    </div>
                    <div className="lg:col-span-2 bg-white p-6 rounded-xl shadow">
                        <h3 className="font-bold text-lg mb-4 text-gray-800">등록된 계정 목록 (가나다순)</h3>
                        <div className="grid gap-3">
                            {sortedAccounts.map(acc => (
                                <div key={acc.id} className="flex flex-col sm:flex-row justify-between items-center p-3 border rounded hover:bg-gray-50 gap-3">
                                    <div className="flex-1"><span className="font-bold text-gray-700">{acc.department}</span> ({acc.username})</div>
                                    <div className="flex items-center gap-2">
                                        {editingId === acc.id ? (
                                            <div className="flex gap-1">
                                                <input type="password" className="border rounded px-2 py-1 text-sm w-32" value={newPassword} onChange={e=>setNewPassword(e.target.value)} />
                                                <button onClick={()=>handleUpdatePassword(acc.id)} className="bg-green-500 text-white px-2 py-1 rounded text-xs">저장</button>
                                                <button onClick={()=>{setEditingId(null); setNewPassword('')}} className="bg-gray-300 text-white px-2 py-1 rounded text-xs">취소</button>
                                            </div>
                                        ) : <button onClick={()=>{setEditingId(acc.id); setNewPassword('')}} className="text-indigo-500 border border-indigo-200 px-3 py-1 rounded text-sm">비번변경</button>}
                                        <button onClick={() => handleDeleteAccount(acc.id)} className="text-red-500 border border-red-200 px-3 py-1 rounded text-sm">삭제</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const TBMFormView = ({ user, setView, showToast, setLoading, initialData }) => {
            const [form, setForm] = useState(initialData || {
                date: getLocalDateInputValue(),
                // Updated default times
                startTime: '09:00',
                endTime: '18:00',
                temperature: '',
                humidity: '',
                workName: '',
                workDesc: '',
                location: '',
                riskAssessmentDone: false,
                risks: [{ id: 1, factor: '', measure: '', result: 'yes', action: '' }],
                keyRiskId: '',
                leader: user.username,
                preChecks: { check1: false, check2: false, check3: false },
                safetyActionChecks: [],
                // New Fields
                dailyCheckResult: '특이사항 없음',
                photoUrl: '',
                attendees: [{ name: user.username || '', signed: false, signatureUrl: '', isLeader: true }]
            });
            const [showSignModal, setShowSignModal] = useState(false);
            const [currentSignerIndex, setCurrentSignerIndex] = useState(null);
            const [submitting, setSubmitting] = useState(false);
            const [showCopyOptions, setShowCopyOptions] = useState(false);
            const [copyOptions, setCopyOptions] = useState({
                overview: true,
                risks: true,
                checks: true,
                attendees: false
            });
            const draftKey = `tbm_draft_${user.department}`;

            useEffect(() => {
                if (initialData) return;
                const raw = localStorage.getItem(draftKey);
                if (!raw) return;
                try {
                    const saved = JSON.parse(raw);
                    setForm(prev => ({ ...prev, ...saved }));
                    showToast("이전에 작성 중이던 내용을 불러왔습니다.", "info");
                } catch (err) {
                    console.warn("임시저장 데이터 파싱 실패:", err);
                }
            }, []);

            useEffect(() => {
                if (initialData) return;
                const timer = setTimeout(() => {
                    try {
                        localStorage.setItem(draftKey, JSON.stringify(form));
                    } catch (err) {
                        console.warn("임시저장 실패:", err);
                    }
                }, 1000);
                return () => clearTimeout(timer);
            }, [form, initialData]);

            const addRiskRow = () => setForm(p => ({...p, risks: [...p.risks, { id: Date.now(), factor: '', measure: '', result: 'yes', action: '' }]}));
            const updateRisk = (id, f, v) => setForm(p => ({...p, risks: p.risks.map(r => r.id===id ? {...r, [f]: v} : r)}));
            const removeRisk = (id) => setForm(p => ({...p, risks: p.risks.filter(r => r.id !== id)}));
            const addAttendee = () => setForm(p => ({...p, attendees: [...p.attendees, { name: '', signed: false, signatureUrl: '', isLeader: false }]}));
            
            // New: Remove Attendee Function
            const removeAttendee = (idx) => {
                const newAtt = form.attendees.filter((_, i) => i !== idx);
                setForm({ ...form, attendees: newAtt });

                // 삭제 후 서명 대상 인덱스가 어긋나지 않도록 보정
                if (currentSignerIndex !== null) {
                    if (currentSignerIndex === idx) {
                        setShowSignModal(false);
                        setCurrentSignerIndex(null);
                    } else if (currentSignerIndex > idx) {
                        setCurrentSignerIndex(currentSignerIndex - 1);
                    }
                }
            };

            const updateAttendee = (idx, name) => {
                const newAtt = [...form.attendees];
                newAtt[idx].name = name;
                setForm({...form, attendees: newAtt});
            };
            const openSignModal = (idx) => {
                if (!form.attendees[idx].name) return showToast("이름을 먼저 입력하세요.", "error");
                setCurrentSignerIndex(idx);
                setShowSignModal(true);
            };
            const handleSaveSignature = (dataUrl) => {
                if (currentSignerIndex === null || !form.attendees[currentSignerIndex]) {
                    showToast('서명 대상 참석자를 다시 선택해 주세요.', 'error');
                    setShowSignModal(false);
                    setCurrentSignerIndex(null);
                    return;
                }
                const newAtt = [...form.attendees];
                newAtt[currentSignerIndex].signed = true;
                newAtt[currentSignerIndex].signatureUrl = dataUrl;
                setForm({ ...form, attendees: newAtt });
                setCurrentSignerIndex(null);
            };
            
            const buildSafetyActionChecksFromRisks = (risks) => {
                return (risks || [])
                    .filter(r => String(r.factor || '').trim() !== '')
                    .map(r => ({
                        risk: r.factor,
                        result: r.result || 'yes',
                        action: r.result === 'no' ? (r.action || '') : ''
                    }));
            };
            const applyQuickDefaults = () => {
                setForm((cur) => ({
                    ...cur,
                    temperature: cur.temperature || '25',
                    humidity: cur.humidity || '50',
                    dailyCheckResult: cur.dailyCheckResult || '특이사항 없음',
                    preChecks: { check1: true, check2: true, check3: true }
                }));
                showToast("기본값을 빠르게 입력했습니다.", "success");
            };
            const fillNoIssueTemplate = () => {
                setForm((cur) => ({
                    ...cur,
                    workDesc: cur.workDesc || '금일 작업 전 TBM 시행, 특이사항 없음.',
                    dailyCheckResult: '특이사항 없음'
                }));
                showToast("무특이 템플릿을 적용했습니다.", "info");
            };
            const toggleCopyOption = (key) => {
                setCopyOptions((prev) => ({ ...prev, [key]: !prev[key] }));
            };
            const normalizeAttendees = (arr) => {
                const next = (arr || []).map((a) => ({
                    name: a.name || '',
                    signed: !!a.signed,
                    signatureUrl: a.signatureUrl || '',
                    isLeader: !!a.isLeader
                }));
                if (!next.length) {
                    return [{ name: user.username || '', signed: false, signatureUrl: '', isLeader: true }];
                }
                next[0].isLeader = true;
                for (let i = 1; i < next.length; i++) next[i].isLeader = false;
                return next;
            };

            const handleLoadPrevious = async () => {
                try {
                    setLoading(true);
                    const q = query(
                        collection(db, "global_tbm_data"),
                        where("department", "==", user.department)
                    );
                    const snap = await getDocs(q);
                    const prev = snap.docs
                        .map(d => ({ id: d.id, ...d.data() }))
                        .sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')))
                        .find(d => !initialData || d.id !== initialData.id);

                    if (!prev) {
                        showToast("복사할 이전 TBM 데이터가 없습니다.", "info");
                        return;
                    }

                    const legacyActionMap = {};
                    (prev.safetyActionChecks || []).forEach((a) => {
                        if (!a?.risk) return;
                        legacyActionMap[a.risk] = { result: a.result || 'yes', action: a.action || '' };
                    });
                    const copiedRisks = (prev.risks || [{ factor: '', measure: '' }]).map((r, i) => {
                        const legacy = legacyActionMap[r.factor] || {};
                        return {
                            id: Date.now() + i,
                            factor: r.factor || '',
                            measure: r.measure || '',
                            result: r.result || legacy.result || 'yes',
                            action: r.action || legacy.action || ''
                        };
                    });

                    setForm((cur) => ({
                        ...cur,
                        ...(copyOptions.overview ? {
                            workName: prev.workName || '',
                            workDesc: prev.workDesc || '',
                            location: prev.location || ''
                        } : {}),
                        ...(copyOptions.risks ? {
                            riskAssessmentDone: !!prev.riskAssessmentDone,
                            risks: copiedRisks,
                            keyRiskId: ''
                        } : {}),
                        ...(copyOptions.checks ? {
                            preChecks: prev.preChecks || { check1: false, check2: false, check3: false },
                            dailyCheckResult: prev.dailyCheckResult || '특이사항 없음'
                        } : {}),
                        ...(copyOptions.attendees ? {
                            attendees: normalizeAttendees(prev.attendees)
                        } : {
                            attendees: normalizeAttendees(cur.attendees)
                        })
                    }));
                    showToast("전주 주요 내용을 복사했습니다. 날짜/시간만 확인 후 저장하세요.", "success");
                } catch (err) {
                    console.error("전주 내용 복사 실패:", err);
                    showToast("이전 데이터 복사 중 오류가 발생했습니다.", "error");
                } finally {
                    setLoading(false);
                }
            };

            // Photo Upload
            const handlePhotoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setForm(prev => ({...prev, photoUrl: reader.result}));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async () => {
                if (submitting) return;
                const missing = [];
                if(!form.workName?.trim()) missing.push("작업명");
                if(!form.location?.trim()) missing.push("장소");
                if (missing.length) return showToast(`저장하려면 ${missing.join(", ")}만 입력해 주세요.`, "info");
                const leader = (form.attendees || []).find(att => att.isLeader);
                if (!leader || !leader.name?.trim()) return showToast("리더(대표 참석자) 이름을 입력해 주세요.", "info");
                if (!leader.signatureUrl) return showToast("리더(대표 참석자) 서명을 완료해 주세요.", "info");
                setSubmitting(true);
                setLoading(true);
                try {
                    const selectedRisk = form.risks.find(r => r.id == form.keyRiskId);
                    const normalizedRisks = (form.risks || []).map((r) => ({
                        ...r,
                        result: r.result || 'yes',
                        action: (r.result || 'yes') === 'no' ? (r.action || '') : ''
                    }));
                    const docData = {
                        ...form,
                        risks: normalizedRisks,
                        safetyActionChecks: buildSafetyActionChecksFromRisks(normalizedRisks),
                        department: user.department,
                        keyRiskFactor: selectedRisk ? selectedRisk.factor : 'N/A',
                        keyRiskMeasure: selectedRisk ? selectedRisk.measure : 'N/A',
                        updatedAt: new Date().toISOString()
                    };
                    if (!initialData) {
                        docData.createdBy = user.username;
                        docData.createdAt = new Date().toISOString();
                        await addDoc(collection(db, "global_tbm_data"), docData);
                        showToast("등록 완료", "success");
                    } else {
                        await updateDoc(doc(db, "global_tbm_data", initialData.id), docData);
                        showToast("수정 완료", "success");
                    }
                    if (!initialData) localStorage.removeItem(draftKey);
                    setView('list');
                } catch (err) { showToast("오류 발생", "error"); }
                setLoading(false);
                setSubmitting(false);
            };

            return (
                <div className="bg-white rounded-xl shadow-lg border border-gray-200 overflow-hidden max-w-4xl mx-auto animate-fade-in-up">
                    <div className="bg-gray-800 text-white p-4 flex justify-between items-center">
                        <h2 className="text-xl font-bold"><i className="fas fa-edit mr-2"></i>{initialData ? "TBM 수정" : "TBM 등록"}</h2>
                        <span className="text-sm bg-gray-700 px-3 py-1 rounded">{user.department}</span>
                    </div>
                    <div className="p-4 sm:p-6 md:p-8 space-y-8">
                        <div className="bg-indigo-50 border border-indigo-200 rounded-lg p-3 flex flex-col sm:flex-row sm:items-center justify-between gap-2 relative">
                            <div className="text-xs text-indigo-900 whitespace-nowrap">
                                필수 입력: <span className="font-bold">작업명·장소·리더서명</span>만 완료 후 저장 가능 (나머지는 필요 시 선택 입력)
                            </div>
                            <div className="flex flex-wrap gap-1">
                                <button onClick={handleLoadPrevious} className="shrink-0 px-2.5 py-1.5 bg-white border border-blue-300 text-blue-700 rounded-lg text-xs font-bold hover:bg-blue-50">
                                    <i className="fas fa-copy mr-1"></i>전주복사
                                </button>
                                <div className="relative">
                                    <button onClick={()=>setShowCopyOptions(v=>!v)} className="shrink-0 px-2.5 py-1.5 bg-white border border-blue-300 text-blue-700 rounded-lg text-xs font-bold hover:bg-blue-50">
                                        <i className="fas fa-sliders mr-1"></i>복사범위
                                    </button>
                                    {showCopyOptions && (
                                        <div className="absolute left-0 top-full mt-2 z-30 w-64 bg-white border border-indigo-200 rounded-lg p-3 text-sm text-gray-700 shadow-lg">
                                            <div className="font-bold mb-2 text-indigo-700">전주 내용 복사 범위</div>
                                            <div className="grid grid-cols-2 gap-2">
                                                <label className="flex items-center gap-2"><input type="checkbox" checked={copyOptions.overview} onChange={()=>toggleCopyOption('overview')} />작업개요</label>
                                                <label className="flex items-center gap-2"><input type="checkbox" checked={copyOptions.risks} onChange={()=>toggleCopyOption('risks')} />위험성평가</label>
                                                <label className="flex items-center gap-2"><input type="checkbox" checked={copyOptions.checks} onChange={()=>toggleCopyOption('checks')} />점검결과</label>
                                                <label className="flex items-center gap-2"><input type="checkbox" checked={copyOptions.attendees} onChange={()=>toggleCopyOption('attendees')} />참석자</label>
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <button onClick={applyQuickDefaults} className="shrink-0 px-2.5 py-1.5 bg-white border border-blue-300 text-blue-700 rounded-lg text-xs font-bold hover:bg-blue-50">
                                    <i className="fas fa-wand-magic-sparkles mr-1"></i>기본값
                                </button>
                                <button onClick={fillNoIssueTemplate} className="shrink-0 px-2.5 py-1.5 bg-white border border-blue-300 text-blue-700 rounded-lg text-xs font-bold hover:bg-blue-50">
                                    <i className="fas fa-file-lines mr-1"></i>무특이
                                </button>
                            </div>
                        </div>

                        <section>
                            <h3 className="text-lg font-bold text-gray-700 mb-4 border-b pb-2">1. 작업 개요</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label className="label-text">일시</label>
                                    <div className="flex gap-2 items-center flex-wrap">
                                        <input type="date" className="input-field flex-grow" value={form.date} onChange={e=>setForm({...form, date:e.target.value})} />
                                        <div className="flex items-center gap-1">
                                            <input type="time" className="input-field w-24" value={form.startTime} onChange={e=>setForm({...form, startTime:e.target.value})} />
                                            <span>~</span>
                                            <input type="time" className="input-field w-24" value={form.endTime} onChange={e=>setForm({...form, endTime:e.target.value})} />
                                        </div>
                                    </div>
                                </div>
                                <div>
                                    <label className="label-text">장소</label>
                                    <input type="text" className="input-field" value={form.location} onChange={e=>setForm({...form, location:e.target.value})} />
                                </div>
                                <div className="flex gap-4 md:col-span-2">
                                    <div className="flex-1">
                                        <label className="label-text">온도 (℃)</label>
                                        <input type="number" className="input-field" placeholder="예: 25" value={form.temperature} onChange={e=>setForm({...form, temperature:e.target.value})} />
                                    </div>
                                    <div className="flex-1">
                                        <label className="label-text">습도 (%)</label>
                                        <input type="number" className="input-field" placeholder="예: 50" value={form.humidity} onChange={e=>setForm({...form, humidity:e.target.value})} />
                                    </div>
                                </div>
                                <div className="md:col-span-2"><label className="label-text">작업명</label><input type="text" className="input-field" value={form.workName} onChange={e=>setForm({...form, workName:e.target.value})} /></div>
                                <div className="md:col-span-2">
                                    <label className="label-text flex items-center justify-between">내용 <i className="fas fa-microphone text-gray-400 hover:text-indigo-500 cursor-pointer" title="음성 입력 (지원 예정)"></i></label>
                                    <textarea className="input-field h-20" value={form.workDesc} onChange={e=>setForm({...form, workDesc:e.target.value})}></textarea>
                                </div>
                            </div>
                        </section>

                        <section className="bg-yellow-50 p-4 sm:p-6 rounded-lg border border-yellow-200">
                             <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center gap-2 mb-4">
                                <h3 className="text-lg font-bold text-yellow-800">2. 위험성 평가</h3>
                                <div className="flex items-center gap-2"><span className="text-sm font-bold">실시여부</span><input type="checkbox" className="w-5 h-5" checked={form.riskAssessmentDone} onChange={e=>setForm({...form, riskAssessmentDone: e.target.checked})} /></div>
                            </div>
                            <div className="space-y-2">
                                <div className="hidden md:grid grid-cols-12 gap-2 text-xs font-bold text-gray-500 text-center mb-1">
                                    <div className="col-span-1">No</div>
                                    <div className="col-span-3">잠재위험요인</div>
                                    <div className="col-span-3">안전대책</div>
                                    <div className="col-span-2">조치여부</div>
                                    <div className="col-span-2">'아니오' 사유</div>
                                    <div className="col-span-1">삭제</div>
                                </div>
                                {form.risks.map((risk, idx) => (
                                    <div key={risk.id} className="grid grid-cols-1 md:grid-cols-12 gap-2 items-center bg-white p-3 rounded border border-yellow-100">
                                        <div className="md:col-span-1 text-center font-bold bg-gray-100 rounded-full w-7 h-7 leading-7 mx-auto md:mx-0">{idx+1}</div>
                                        <div className="md:col-span-3">
                                            <label className="md:hidden block text-xs font-bold text-gray-500 mb-1">잠재위험요인</label>
                                            <input type="text" className="input-field py-1 text-sm" placeholder="위험요인" value={risk.factor} onChange={e=>updateRisk(risk.id, 'factor', e.target.value)} />
                                        </div>
                                        <div className="md:col-span-3">
                                            <label className="md:hidden block text-xs font-bold text-gray-500 mb-1">안전대책</label>
                                            <input type="text" className="input-field py-1 text-sm" placeholder="대책" value={risk.measure} onChange={e=>updateRisk(risk.id, 'measure', e.target.value)} />
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="md:hidden block text-xs font-bold text-gray-500 mb-1">조치여부</label>
                                            <select className="input-field py-1 text-xs" value={risk.result || 'yes'} onChange={e=>updateRisk(risk.id, 'result', e.target.value)}>
                                                <option value="yes">예</option>
                                                <option value="no">아니오</option>
                                            </select>
                                        </div>
                                        <div className="md:col-span-2">
                                            <label className="md:hidden block text-xs font-bold text-gray-500 mb-1">'아니오' 사유</label>
                                            <input type="text" className="input-field py-1 text-xs" placeholder="미조치 사유" value={risk.action || ''} onChange={e=>updateRisk(risk.id, 'action', e.target.value)} disabled={(risk.result || 'yes') === 'yes'} />
                                        </div>
                                        <div className="md:col-span-1 text-center"><button onClick={()=>removeRisk(risk.id)} className="text-red-400 px-2 py-1 border rounded md:border-0"><i className="fas fa-times mr-1 md:mr-0"></i><span className="md:hidden">삭제</span></button></div>
                                    </div>
                                ))}
                                <button onClick={addRiskRow} className="w-full py-2 border-2 border-dashed border-gray-300 text-gray-500 rounded text-sm hover:bg-white">+ 위험요인 추가</button>
                            </div>
                            <div className="mt-4"><label className="label-text text-red-600 font-bold">중점 위험요인 선택</label><select className="input-field" value={form.keyRiskId} onChange={e=>setForm({...form, keyRiskId: e.target.value})}><option value="">선택하세요</option>{form.risks.map((r,i)=>(<option key={r.id} value={r.id}>{i+1}. {r.factor}</option>))}</select></div>
                        </section>

                        <section className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <h3 className="text-lg font-bold text-gray-700 mb-4 border-b pb-2">4. 작업 전 안전 점검 (Checklist)</h3>
                                <div className="space-y-2 mb-6">
                                    <label className="flex items-center p-2 border rounded bg-white"><input type="checkbox" className="mr-2" checked={form.preChecks.check1} onChange={e=>setForm({...form, preChecks:{...form.preChecks, check1:e.target.checked}})} />보호구 착용</label>
                                    <label className="flex items-center p-2 border rounded bg-white"><input type="checkbox" className="mr-2" checked={form.preChecks.check2} onChange={e=>setForm({...form, preChecks:{...form.preChecks, check2:e.target.checked}})} />장비 점검</label>
                                    <label className="flex items-center p-2 border rounded bg-white"><input type="checkbox" className="mr-2" checked={form.preChecks.check3} onChange={e=>setForm({...form, preChecks:{...form.preChecks, check3:e.target.checked}})} />건강 상태</label>
                                </div>
                                <h3 className="text-lg font-bold text-gray-700 mb-4 border-b pb-2">작업 전 일일 안전점검 시행 결과</h3>
                                <textarea className="input-field h-[184px]" placeholder="특이사항 없음" value={form.dailyCheckResult} onChange={e=>setForm({...form, dailyCheckResult:e.target.value})}></textarea>
                            </div>
                            <div>
                                <h3 className="text-lg font-bold text-gray-700 mb-3 border-b pb-2">5. 참석자 ({form.attendees.length}명)</h3>
                                <div className="text-xs text-indigo-700 bg-indigo-50 border border-indigo-200 rounded p-2 mb-3">
                                    참석자 이름은 모두 기록하고, 서명은 리더 1명만 필수입니다. 추가 참석자 서명은 선택입니다.
                                </div>
                                <div className="bg-gray-50 p-4 rounded h-40 overflow-y-auto space-y-2 mb-3">
                                    {form.attendees.map((att, idx) => (
                                        <div key={idx} className="flex items-center gap-2 bg-white p-2 rounded border shadow-sm">
                                            <div className={`w-12 shrink-0 text-center px-1 py-1 rounded text-xs font-bold ${att.isLeader ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-700'}`}>
                                                {att.isLeader ? '리더' : '참석'}
                                            </div>
                                            <input type="text" placeholder={att.isLeader ? "리더 이름" : "참석자 이름"} className="border border-gray-300 rounded px-3 py-2 text-sm w-20 sm:w-28 md:w-32 shrink-0 text-center font-bold outline-none focus:ring-2 focus:ring-indigo-500 h-12" value={att.name} onChange={e=>updateAttendee(idx, e.target.value)} disabled={att.signed} />
                                            <div onClick={()=>!att.signed && openSignModal(idx)} className={`flex-1 min-w-0 h-12 border rounded flex items-center justify-center cursor-pointer transition ${att.signed ? 'bg-white border-indigo-500' : 'bg-gray-50 border-dashed hover:bg-indigo-50'}`}>
                                                {att.signed && att.signatureUrl ? <img src={att.signatureUrl} alt="서명" className="h-full object-contain" /> : <span className="text-sm text-gray-400 font-bold whitespace-nowrap"><i className="fas fa-file-signature mr-1"></i>{att.isLeader ? '리더 서명(필수)' : '서명 생략 가능'}</span>}
                                            </div>
                                            {!att.isLeader && (
                                                <button onClick={() => removeAttendee(idx)} className="w-8 h-8 shrink-0 flex items-center justify-center text-red-400 hover:text-red-600 hover:bg-red-50 rounded-full transition" title="참석자 삭제">
                                                    <i className="fas fa-minus-circle"></i>
                                                </button>
                                            )}
                                        </div>
                                    ))}
                                    <button onClick={addAttendee} className="w-full py-2 bg-indigo-50 text-indigo-600 font-bold rounded text-sm hover:bg-indigo-100">+ 참석자 추가(선택)</button>
                                </div>
                                <h3 className="text-lg font-bold text-gray-700 mb-3 border-b pb-2">6. TBM 활동 사진 첨부</h3>
                                <div className="border-2 border-dashed border-gray-300 rounded-lg p-6 text-center hover:bg-gray-50 transition relative">
                                    <input type="file" accept="image/*" onChange={handlePhotoUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                    {form.photoUrl ? (
                                        <img src={form.photoUrl} alt="Preview" className="max-h-32 mx-auto rounded shadow" />
                                    ) : (
                                        <div className="text-gray-400"><i className="fas fa-camera text-3xl mb-2"></i><br/>클릭하여 사진 촬영/업로드</div>
                                    )}
                                </div>
                            </div>
                        </section>
                        <div className="pt-6 border-t flex flex-col-reverse sm:flex-row justify-end gap-3 sm:gap-4">
                            <button onClick={()=>setView('list')} className="w-full sm:w-auto px-6 py-3 border rounded">취소</button>
                            <button onClick={handleSubmit} disabled={submitting} className={`w-full sm:w-auto px-8 py-3 text-white rounded font-bold shadow-lg ${submitting ? 'bg-indigo-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                                {submitting ? <><i className="fas fa-spinner fa-spin mr-2"></i>저장 중...</> : '저장'}
                            </button>
                        </div>
                    </div>
                    <SignatureModal
                        isOpen={showSignModal}
                        onClose={() => {
                            setShowSignModal(false);
                            setCurrentSignerIndex(null);
                        }}
                        onSave={handleSaveSignature}
                        signerName={currentSignerIndex !== null ? (form.attendees[currentSignerIndex]?.name || '') : ''}
                    />
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(null); 
            const [view, setView] = useState('login'); 
            const [loading, setLoading] = useState(true);
            const [toast, setToast] = useState(null);
            const [tbms, setTbms] = useState([]);
            const [accounts, setAccounts] = useState([]);
            const [currentYear, setCurrentYear] = useState('2026'); // Default 2026
            const [availableYears, setAvailableYears] = useState(['2026']); // Default Only 2026
            const [loginId, setLoginId] = useState('');
            const [loginPw, setLoginPw] = useState('');
            const [saveId, setSaveId] = useState(false);
            const [editTbmData, setEditTbmData] = useState(null);
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            
            // PDF Generation State
            const [downloadingPdf, setDownloadingPdf] = useState(false);
            const [targetPdfTbm, setTargetPdfTbm] = useState(null);

            useEffect(() => {
                const saved = localStorage.getItem('savedId');
                if (saved) { setLoginId(saved); setSaveId(true); }

                let unsubUsers = null;
                let unsubTbms = null;
                let mounted = true;

                const init = async () => {
                    try {
                        await signInAnonymously(auth);

                        // Fetch System Config
                        const configDoc = await getDoc(doc(db, "system_settings", "config"));
                        if (mounted && configDoc.exists()) {
                            setAvailableYears(configDoc.data().years || ['2026']);
                        }

                        // --- Sort Logic Applied Here (Global) ---
                        unsubUsers = onSnapshot(
                            query(collection(db, "app_users")),
                            (s) => {
                                if (!mounted) return;
                                const fetchedAccounts = s.docs.map(d => ({id:d.id, ...d.data()}));
                                fetchedAccounts.sort((a, b) => {
                                    const deptA = a.department || '';
                                    const deptB = b.department || '';
                                    return deptA.localeCompare(deptB, 'ko');
                                });
                                setAccounts(fetchedAccounts);
                            },
                            (err) => {
                                console.error("app_users 구독 실패:", err);
                                if (mounted) setToast({ message: "계정 데이터 구독 실패", type: "error" });
                            }
                        );

                        unsubTbms = onSnapshot(
                            query(collection(db, "global_tbm_data"), orderBy("createdAt", "desc")),
                            (s) => {
                                if (!mounted) return;
                                setTbms(s.docs.map(d => ({id:d.id, ...d.data()})));
                                setLoading(false);
                            },
                            (err) => {
                                console.error("global_tbm_data 구독 실패:", err);
                                if (mounted) {
                                    setToast({ message: "TBM 데이터 구독 실패", type: "error" });
                                    setLoading(false);
                                }
                            }
                        );
                    } catch (err) {
                        console.error("초기화 실패:", err);
                        if (mounted) {
                            setToast({ message: "초기화 중 오류가 발생했습니다.", type: "error" });
                            setLoading(false);
                        }
                    }
                };
                init();

                return () => {
                    mounted = false;
                    if (typeof unsubUsers === 'function') unsubUsers();
                    if (typeof unsubTbms === 'function') unsubTbms();
                };
            }, []);

            const showToast = (msg, type = 'info') => setToast({ message: msg, type });

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                if (saveId) localStorage.setItem('savedId', loginId);
                else localStorage.removeItem('savedId');

                try {
                    // 운영 연속성: master 계정이 아직 없을 때만 임시 관리자 로그인 허용
                    if (loginId === 'admin' && loginPw === '0908') {
                        const realMaster = accounts.find(a => a.role === 'master');
                        if (!realMaster || accounts.length === 0) {
                            setUser({ id: 'temp_master', username: 'Master Admin', role: 'master', department: '경영기획팀' });
                            setView('dashboard');
                            showToast('관리자로 로그인했습니다.', 'success');
                            return;
                        }
                    }

                    const normalizedLoginId = String(loginId || '').trim();
                    const foundUser = accounts.find(a => String(a.username || '').trim() === normalizedLoginId);
                    if (!foundUser) {
                        showToast('정보 불일치', 'error');
                        return;
                    }

                    const ok = await verifyPassword(loginPw, foundUser);
                    if (!ok) {
                        showToast('정보 불일치', 'error');
                        return;
                    }

                    // Legacy plain-password account is upgraded to hash after successful login.
                    if (!foundUser.passwordHash && typeof foundUser.password === 'string') {
                        const passwordHash = await hashPassword(loginPw);
                        await updateDoc(doc(db, "app_users", foundUser.id), {
                            passwordHash,
                            updatedAt: new Date().toISOString()
                        });
                    }

                    setUser(foundUser);
                    setView('dashboard');
                    showToast('로그인 성공', 'success');
                } catch (err) {
                    console.error("로그인 처리 실패:", err);
                    showToast('로그인 처리 중 오류', 'error');
                } finally {
                    setLoading(false);
                }
            };

            const handleEditTbm = (tbm) => {
                setEditTbmData(tbm);
                setView('write');
            };

            const handleDeleteTbm = async (id) => {
                if(confirm("정말 삭제하시겠습니까?")) {
                    await deleteDoc(doc(db, "global_tbm_data", id));
                    showToast("삭제 완료", "success");
                }
            };
            
            const handlePdfDownload = (tbm) => {
                showToast("PDF 생성을 시작합니다...", "info");
                setTargetPdfTbm(tbm);
                setDownloadingPdf(true);
            };

            const handlePdfComplete = () => {
                setDownloadingPdf(false);
                setTargetPdfTbm(null);
                showToast("PDF 다운로드가 완료되었습니다.", "success");
            };

            const handleLogout = () => { setUser(null); setView('login'); setLoginId(''); setLoginPw(''); setMobileMenuOpen(false); };

            const myTbms = useMemo(() => {
                if (!user) return [];
                const filtered = tbms.filter(t => t.date.startsWith(currentYear));
                if (user.role === 'master') return filtered;
                return filtered.filter(t => t.department === user.department);
            }, [tbms, user, currentYear]);

            const stats = useMemo(() => {
                const yearTbms = tbms.filter(t => t.date.startsWith(currentYear));
                const total = yearTbms.length;
                const safeCount = yearTbms.filter(t => t.riskAssessmentDone).length;
                const monthlyData = Array.from({length: 12}, (_, i) => ({ label: `${i+1}월`, value: 0 }));
                yearTbms.forEach(t => {
                    if(t.date) monthlyData[new Date(t.date).getMonth()].value++;
                });
                return { total, safeCount, monthlyData: monthlyData }; // REMOVED SLICE
            }, [tbms, currentYear]);

            if (loading && !user && view !== 'login') return <div className="h-screen flex items-center justify-center flex-col"><i className="fas fa-circle-notch fa-spin text-4xl text-indigo-600 mb-4"></i><p>Loading...</p></div>;

            return (
                <div className="flex h-[100dvh] overflow-hidden">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    
                    {/* Hidden PDF Generator */}
                    {downloadingPdf && targetPdfTbm && (
                        <PdfHiddenGenerator tbm={targetPdfTbm} onComplete={handlePdfComplete} />
                    )}

                    {view === 'login' ? (
                        <div className="w-full"><LoginView loginId={loginId} setLoginId={setLoginId} loginPw={loginPw} setLoginPw={setLoginPw} handleLogin={handleLogin} saveId={saveId} setSaveId={setSaveId} loading={loading} /></div>
                    ) : (
                        <>
                            <div className="md:hidden fixed top-0 left-0 right-0 z-30 h-14 bg-white/95 backdrop-blur border-b border-blue-100 px-3 flex items-center justify-between">
                                <button onClick={() => setMobileMenuOpen(true)} className="w-9 h-9 rounded-lg border border-blue-200 text-blue-700">
                                    <i className="fas fa-bars"></i>
                                </button>
                                <div className="font-bold text-blue-700 text-sm"><i className="fas fa-hard-hat mr-1"></i>Smart TBM</div>
                                <button onClick={handleLogout} className="w-9 h-9 rounded-lg border border-slate-200 text-slate-500">
                                    <i className="fas fa-sign-out-alt"></i>
                                </button>
                            </div>
                            {mobileMenuOpen && (
                                <div className="md:hidden fixed inset-0 bg-black/35 z-30" onClick={() => setMobileMenuOpen(false)}></div>
                            )}
                            <Sidebar
                                user={user}
                                view={view}
                                setView={(v) => { if(v==='write') setEditTbmData(null); setView(v); }}
                                handleLogout={handleLogout}
                                mobileMenuOpen={mobileMenuOpen}
                                setMobileMenuOpen={setMobileMenuOpen}
                            />
                            <main className="flex-1 md:ml-64 p-4 sm:p-6 md:p-8 overflow-y-auto h-[100dvh] pt-[4.5rem] md:pt-8 app-main">
                                {view === 'dashboard' && <DashboardView stats={stats} tbms={tbms} currentYear={currentYear} setCurrentYear={setCurrentYear} allTbms={tbms} availableYears={availableYears} />}
                                {view === 'list' && (
                                    <ListView 
                                        user={user} 
                                        myTbms={myTbms} 
                                        setView={(v) => { if(v==='write') setEditTbmData(null); setView(v); }} 
                                        accounts={accounts} 
                                        allTbms={tbms} 
                                        currentYear={currentYear} 
                                        setCurrentYear={setCurrentYear} 
                                        onEdit={handleEditTbm} 
                                        onDelete={handleDeleteTbm} 
                                        onPdfDownload={handlePdfDownload}
                                        availableYears={availableYears}
                                    />
                                )}
                                {view === 'write' && <TBMFormView user={user} setView={setView} showToast={showToast} setLoading={setLoading} initialData={editTbmData} />}
                                {view === 'admin' && <AdminView accounts={accounts} showToast={showToast} />}
                                {view === 'settings' && <SettingsView availableYears={availableYears} setAvailableYears={setAvailableYears} />}
                            </main>
                        </>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
        
        // Dynamic Style for animation
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            .app-main {
                background:
                    radial-gradient(700px 300px at 0% 0%, rgba(59,130,246,0.12), transparent 60%),
                    radial-gradient(700px 300px at 100% 0%, rgba(14,165,233,0.1), transparent 60%),
                    #f7faff;
            }
            .input-field {
                width: 100%;
                border: 1px solid #d2deee;
                border-radius: 0.75rem;
                padding: 0.62rem 0.82rem;
                background: #ffffff;
                outline: none;
                transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            }
            .input-field:focus {
                border-color: #1a73e8;
                box-shadow: 0 0 0 3px rgba(26,115,232,0.15);
                background: #fbfdff;
            }
            .label-text {
                display: block;
                font-size: 0.84rem;
                font-weight: 700;
                color: #42526a;
                margin-bottom: 0.35rem;
                letter-spacing: -0.01em;
            }
            .bg-white, .bg-white\\/95 {
                box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
            }
            @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
            .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }
            @keyframes bounceIn { 0% { transform: scale(0.9); opacity: 0; } 70% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
            .animate-bounce-in { animation: bounceIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        `;
        document.head.appendChild(styleSheet);
    </script>
</body>
</html>
