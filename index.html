<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart TBM : Enterprise Safety Management</title>
    
    <!-- React & ReactDOM (Core) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (Transpiler) -->
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    
    <!-- Tailwind CSS (Styling) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- PDF Generation Libs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- FontAwesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, where, updateDoc, setDoc, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyBYC9PUBg62xJi7L_C692VX6RwziN8B-GU",
            authDomain: "dol-party.firebaseapp.com",
            projectId: "dol-party",
            storageBucket: "dol-party.firebasestorage.app",
            messagingSenderId: "489405410374",
            appId: "1:489405410374:web:9985f13204301ad3fcee47",
            measurementId: "G-YKZ3LC9YL8"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Expose to window for React to use
        window.db = db;
        window.auth = auth;
        window.firebaseModules = { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, where, updateDoc, setDoc, getDocs, getDoc, signInAnonymously };
    </script>

    <style>
        :root {
            --g-bg: #f5f8fd;
            --g-panel: #ffffff;
            --g-text: #1f2937;
            --g-subtext: #64748b;
            --g-line: #dbe4f0;
            --g-primary: #1a73e8;
            --g-primary-soft: #e8f0fe;
        }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            color: var(--g-text);
            background:
                radial-gradient(900px 400px at -10% -10%, #dbeafe 0%, transparent 60%),
                radial-gradient(900px 400px at 110% -10%, #e0f2fe 0%, transparent 60%),
                var(--g-bg);
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .signature-font { font-family: 'Nanum Pen Script', cursive; font-size: 1.5rem; color: #1a73e8; }
        .pdf-doc table th,
        .pdf-doc table td {
            vertical-align: middle !important;
        }
        .pdf-doc .pdf-header-cell {
            position: relative;
            padding-top: 4px !important;
            padding-bottom: 8px !important;
        }
        .pdf-doc .pdf-header-text {
            display: inline-block;
            position: relative;
            top: -2px;
            line-height: 1.2;
        }
        .pdf-doc .pdf-body-text {
            display: inline-block;
            position: relative;
            top: -1px;
            line-height: 1.25;
        }
        
        /* Print/PDF specific styles */
        .print-only { display: none; }
        
        /* Canvas specific */
        canvas { touch-action: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, where, updateDoc, setDoc, getDocs, getDoc, signInAnonymously } = window.firebaseModules;
        const db = window.db;
        const auth = window.auth;
        const { jsPDF } = window.jspdf;

        // --- Utils (ISO 8601 Standard) ---
        const getWeekNumber = (d) => {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
            return weekNo;
        };

        const getFormattedWeek = (dateStr) => {
            const d = new Date(dateStr);
            const year = d.getFullYear();
            const month = d.getMonth() + 1;
            const firstDayOfMonth = new Date(year, month - 1, 1);
            const firstDayOfWeek = firstDayOfMonth.getDay();
            const offsetDate = d.getDate() + firstDayOfWeek - 1;
            const weekOfMonth = Math.floor(offsetDate / 7) + 1;
            return `${year}년 ${month}월 ${weekOfMonth}주차`;
        };

        const getLocalDateInputValue = () => {
            const now = new Date();
            const offsetMs = now.getTimezoneOffset() * 60000;
            return new Date(now.getTime() - offsetMs).toISOString().split('T')[0];
        };

        const hashPassword = async (plainText) => {
            const msgUint8 = new TextEncoder().encode(String(plainText || ''));
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            return Array.from(new Uint8Array(hashBuffer))
                .map((b) => b.toString(16).padStart(2, '0'))
                .join('');
        };

        const verifyPassword = async (inputPassword, account) => {
            const normalizedInput = String(inputPassword ?? '').trim();
            if (account?.passwordHash) {
                const hashed = await hashPassword(normalizedInput);
                return hashed === account.passwordHash;
            }
            // Legacy fallback for old documents (plain password)
            const legacyCandidates = [
                account?.password,
                account?.pw,
                account?.pass
            ];
            return legacyCandidates.some((v) => {
                if (v === undefined || v === null) return false;
                return normalizedInput === String(v).trim();
            });
        };

        // FIXED: ISO 8601 compliant week date range calculator
        const getWeekDetails = (year, weekNo) => {
            // ISO Week 1 is the week with the first Thursday of the year (Jan 4th is always in Week 1)
            const jan4 = new Date(year, 0, 4);
            const day = jan4.getDay() || 7; // Mon=1, Sun=7
            const week1Start = new Date(jan4);
            week1Start.setDate(jan4.getDate() - day + 1); // Start of ISO Week 1 (Monday)

            // Calculate start date of the requested week
            const start = new Date(week1Start);
            start.setDate(week1Start.getDate() + (weekNo - 1) * 7);
            
            const end = new Date(start);
            end.setDate(start.getDate() + 6);
            
            // Format dates
            const fmt = (date) => `${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
            
            // Determine month for label (based on Thursday of the week to handle month overlap)
            const thursday = new Date(start);
            thursday.setDate(start.getDate() + 3);
            const month = thursday.getMonth() + 1;
            
            // Simple visual "Week of Month" for the label
            const weekOfMonth = Math.ceil(start.getDate() / 7);

            return {
                startYear: start.getFullYear(),
                label: `${year}년 ${month}월 ${weekOfMonth}주차 (${fmt(start)}~${fmt(end)})`,
                value: `${year}-W${weekNo}`
            };
        };

        // --- Error Boundary ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center h-screen bg-red-50 text-red-800 p-8">
                            <i className="fas fa-exclamation-triangle text-6xl mb-4"></i>
                            <h1 className="text-3xl font-bold mb-2">시스템 오류 발생</h1>
                            <p className="mb-6 text-center max-w-md">일시적인 오류가 발생했습니다.<br/>(Error: {this.state.error.message})</p>
                            <button onClick={() => window.location.reload()} className="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition shadow-lg">재시작</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- Helper Components ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, []);
            const bgClass = type === 'success' ? 'bg-green-600' : type === 'error' ? 'bg-red-600' : 'bg-blue-600';
            return (
                <div className={`fixed top-4 left-1/2 -translate-x-1/2 sm:left-auto sm:translate-x-0 sm:right-5 ${bgClass} text-white px-4 sm:px-6 py-3 rounded-lg shadow-xl z-50 flex items-center animate-bounce-in max-w-[calc(100vw-1.5rem)]`}>
                    <i className={`fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} mr-3`}></i>
                    {message}
                </div>
            );
        };

        // --- Chart Components ---
        const KPICard = ({ title, value, icon, color, subtext }) => {
            const iconTextClassMap = {
                'bg-blue-500': 'text-blue-600',
                'bg-green-500': 'text-green-600',
                'bg-purple-500': 'text-purple-600',
                'bg-pink-500': 'text-pink-600'
            };
            const iconTextClass = iconTextClassMap[color] || 'text-indigo-600';
            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow">
                    <div className="flex justify-between items-start">
                        <div>
                            <p className="text-sm text-gray-500 mb-1 font-medium">{title}</p>
                            <h3 className="text-3xl font-bold text-gray-800">{value}</h3>
                        </div>
                        <div className={`p-3 rounded-lg ${color} bg-opacity-10 ${iconTextClass}`}>
                            <i className={`fas ${icon} text-xl`}></i>
                        </div>
                    </div>
                    <p className="text-xs text-gray-400 mt-4">{subtext}</p>
                </div>
            );
        };

        const SimpleBarChart = ({ data }) => {
            const values = data.map(d => d.value);
            const maxVal = Math.max(...values);
            const scaleMax = maxVal === 0 ? 5 : maxVal <= 5 ? maxVal + 2 : maxVal * 1.2;
            
            return (
                <div className="h-64 flex items-end justify-around space-x-2 pt-10 border-b border-gray-200">
                    {data.map((d, i) => (
                        <div key={i} className="flex flex-col items-center w-full group">
                            <div className="relative w-full flex justify-center h-full items-end">
                                <div className="absolute -top-8 bg-gray-800 text-white text-xs px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                    {d.value}건
                                </div>
                                <div 
                                    className="w-3/5 bg-indigo-500 rounded-t-md hover:bg-indigo-600 transition-all duration-500 relative"
                                    style={{ height: `${(d.value / scaleMax) * 100}%`, minHeight: d.value > 0 ? '4px' : '0' }}
                                >
                                </div>
                            </div>
                            <span className="text-xs text-gray-500 mt-2 font-medium">{d.label}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const DonutChart = ({ data }) => {
            const total = data.reduce((acc,cur) => acc + cur.value, 0); 
            const renderTotal = total || 1; // Prevent division by zero only for scale calculation
            const colors = ['#6366f1', '#ec4899', '#10b981', '#f59e0b'];
            
            return (
                <div className="flex flex-col items-center justify-center pt-2">
                    <div className="relative w-40 h-40 rounded-full border-8 border-gray-100 flex items-center justify-center">
                        {/* Only show color if there is actual data */}
                        {total > 0 && (
                            <div className="absolute inset-0 rounded-full opacity-20 bg-[conic-gradient(at_center,_var(--tw-gradient-stops))] from-indigo-500 via-purple-500 to-pink-500"></div>
                        )}
                        <div className="text-center">
                            <div className="text-2xl font-bold text-gray-800">{total}</div>
                            <div className="text-xs text-gray-500">Total</div>
                        </div>
                    </div>
                    <div className="mt-6 w-full space-y-2">
                        {total === 0 ? (
                            <div className="text-center text-sm text-gray-400 py-4">등록된 데이터가 없습니다.</div>
                        ) : (
                            data.slice(0,4).map((d, i) => (
                                <div key={i} className="flex justify-between text-sm px-4">
                                    <span className="flex items-center"><span className="w-3 h-3 rounded-full mr-2" style={{backgroundColor: colors[i%4]}}></span>{d.label}</span>
                                    <span className="font-bold">{Math.round((d.value/renderTotal)*100)}%</span>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const RiskGauge = ({ score }) => {
            const rotation = (score / 100) * 180;
            const color = score > 80 ? '#22c55e' : score > 50 ? '#eab308' : '#ef4444';
            return (
                <div className="relative w-48 h-24 overflow-hidden mx-auto mt-4">
                    <div className="absolute top-0 left-0 w-full h-full bg-gray-200 rounded-t-full"></div>
                    <div className="absolute top-0 left-0 w-full h-full rounded-t-full origin-bottom transform transition-transform duration-1000 ease-out" style={{ background: color, transform: `rotate(${rotation - 180}deg)` }}></div>
                    <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 translate-y-1/2 w-32 h-32 bg-white rounded-full flex items-center justify-center border-4 border-gray-100">
                        <span className="text-2xl font-bold -mt-8 text-gray-700">{score}점</span>
                    </div>
                </div>
            );
        };

        // --- Signature Pad Component ---
        const SignatureModal = ({ isOpen, onClose, onSave, signerName }) => {
            const canvasRef = useRef(null);
            const isDrawing = useRef(false);
            const pointsRef = useRef([]);
            const MIN_MOVE_DISTANCE = 2.6;
            const STROKE_SMOOTHING = 0.42;
            const [hasSigned, setHasSigned] = useState(false);

            useEffect(() => {
                if (isOpen && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = 'black';
                    ctx.lineJoin = 'round';
                    
                    setTimeout(() => {
                        const rect = canvas.getBoundingClientRect();
                        canvas.width = rect.width;
                        canvas.height = rect.height;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }, 50);
                    
                    pointsRef.current = [];
                    setHasSigned(false);
                }
            }, [isOpen]);

            const getPos = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            };

            const distance = (a, b) => {
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                return Math.sqrt(dx * dx + dy * dy);
            };

            const midPoint = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });

            const startDrawing = (e) => {
                e.preventDefault();
                isDrawing.current = true;
                const { x, y } = getPos(e);
                pointsRef.current = [{ x, y }];
                const ctx = canvasRef.current.getContext('2d');

                // tap 입력도 보이도록 시작점 표시
                ctx.beginPath();
                ctx.arc(x, y, ctx.lineWidth * 0.45, 0, Math.PI * 2);
                ctx.fillStyle = ctx.strokeStyle;
                ctx.fill();
                setHasSigned(true);
            };

            const draw = (e) => {
                if (!isDrawing.current) return;
                e.preventDefault();

                const { x, y } = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                const prev = pointsRef.current[pointsRef.current.length - 1];

                let current = { x, y };
                if (prev) {
                    current = {
                        x: prev.x + (x - prev.x) * STROKE_SMOOTHING,
                        y: prev.y + (y - prev.y) * STROKE_SMOOTHING,
                    };
                }

                if (prev && distance(prev, current) < MIN_MOVE_DISTANCE) return;

                pointsRef.current.push(current);

                if (pointsRef.current.length < 3) {
                    ctx.beginPath();
                    ctx.moveTo(prev.x, prev.y);
                    ctx.lineTo(current.x, current.y);
                    ctx.stroke();
                    return;
                }

                const p0 = pointsRef.current[pointsRef.current.length - 3];
                const p1 = pointsRef.current[pointsRef.current.length - 2];
                const p2 = pointsRef.current[pointsRef.current.length - 1];
                const m1 = midPoint(p0, p1);
                const m2 = midPoint(p1, p2);

                ctx.beginPath();
                ctx.moveTo(m1.x, m1.y);
                ctx.quadraticCurveTo(p1.x, p1.y, m2.x, m2.y);
                ctx.stroke();
                setHasSigned(true);
            };

            const stopDrawing = () => {
                isDrawing.current = false;
                pointsRef.current = [];
            };

            const handleSave = () => {
                if (!hasSigned) return;
                const dataUrl = canvasRef.current.toDataURL();
                onSave(dataUrl);
                onClose();
            };

            const handleClear = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pointsRef.current = [];
                setHasSigned(false);
            };

            if (!isOpen) return null;

            const modalUi = (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col">
                        <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">
                            <h3 className="font-bold text-lg text-gray-800"><i className="fas fa-pen-nib mr-2 text-indigo-600"></i>전자 서명 ({signerName})</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><i className="fas fa-times text-xl"></i></button>
                        </div>
                        <div className="p-4 bg-gray-100 flex-1 relative h-64">
                            <canvas
                                ref={canvasRef}
                                style={{width: '100%', height: '100%'}}
                                className="bg-white rounded border border-gray-300 shadow-inner block cursor-crosshair"
                                onMouseDown={startDrawing}
                                onMouseMove={draw}
                                onMouseUp={stopDrawing}
                                onMouseLeave={stopDrawing}
                                onTouchStart={startDrawing}
                                onTouchMove={draw}
                                onTouchEnd={stopDrawing}
                            />
                            {!hasSigned && <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-30 text-2xl font-bold text-gray-400">서명해 주세요</div>}
                        </div>
                        <div className="p-4 border-t flex justify-between gap-3">
                            <button onClick={handleClear} className="px-4 py-2 border border-gray-300 text-gray-600 rounded hover:bg-gray-50"><i className="fas fa-eraser mr-1"></i> 지우기</button>
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">취소</button>
                                <button onClick={handleSave} disabled={!hasSigned} className={`px-6 py-2 text-white rounded font-bold shadow ${!hasSigned ? 'bg-gray-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700'}`}>서명 완료</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return ReactDOM.createPortal(modalUi, document.body);
        };

        // --- Hidden PDF Generator (Auto Download - Fixed Layout) ---
        const PdfHiddenGenerator = ({ tbm, onComplete }) => {
            const printRef = useRef(null);
            
            useEffect(() => {
                const generate = async () => {
                    if(!printRef.current) return;
                    try {
                        if (document.fonts && document.fonts.ready) {
                            await document.fonts.ready;
                        }
                        await new Promise(resolve => setTimeout(resolve, 500));
                        const canvas = await html2canvas(printRef.current, {
                            scale: 2,
                            useCORS: true,
                            backgroundColor: '#ffffff',
                            width: printRef.current.scrollWidth,
                            height: printRef.current.scrollHeight,
                            windowWidth: printRef.current.scrollWidth,
                            windowHeight: printRef.current.scrollHeight
                        });
                        const imgData = canvas.toDataURL('image/png');
                        const pdf = new jsPDF('p', 'mm', 'a4');
                        const pageWidth = pdf.internal.pageSize.getWidth();
                        const pageHeight = pdf.internal.pageSize.getHeight();
                        const imgWidth = pageWidth;
                        const imgHeight = (canvas.height * imgWidth) / canvas.width;

                        let heightLeft = imgHeight;
                        let position = 0;

                        pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                        heightLeft -= pageHeight;

                        while (heightLeft > 0) {
                            position = heightLeft - imgHeight;
                            pdf.addPage();
                            pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                            heightLeft -= pageHeight;
                        }
                        pdf.save(`TBM_${tbm.date}_${tbm.department}.pdf`);
                    } catch (e) {
                        console.error("PDF Gen Error", e);
                    } finally {
                        onComplete();
                    }
                };
                generate();
            }, []);

            return (
                <div style={{ position: 'fixed', left: '-10000px', top: 0 }}>
                    <div
                        ref={printRef}
                        className="pdf-doc bg-white p-8 text-black w-[210mm] min-h-[297mm] text-sm leading-relaxed border border-gray-300 font-sans"
                        style={{ boxSizing: 'border-box' }}
                    >
                        <h1 className="text-3xl font-bold text-center mb-8 pb-4 border-b-2 border-black">Tool Box Meeting 회의록</h1>
                        
                        <table className="w-full border-collapse border-2 border-black mb-6 table-fixed">
                            <tbody>
                                <tr className="h-10">
                                    <th className="border border-black bg-gray-100 w-[15%] text-center align-middle font-bold" style={{verticalAlign: 'middle'}}>TBM 일시</th>
                                    <td className="border border-black pl-2 align-middle" style={{verticalAlign: 'middle'}}>{tbm.date} {tbm.startTime} ~ {tbm.endTime}</td>
                                    <th className="border border-black bg-gray-100 w-[15%] text-center align-middle font-bold" style={{verticalAlign: 'middle'}}>작성자</th>
                                    <td className="border border-black pl-2 align-middle" style={{verticalAlign: 'middle'}}>{tbm.leader} ({tbm.department})</td>
                                </tr>
                                <tr className="h-10">
                                    <th className="border border-black bg-gray-100 text-center align-middle font-bold" style={{verticalAlign: 'middle'}}>작업명</th>
                                    <td colSpan="3" className="border border-black pl-2 align-middle font-bold" style={{verticalAlign: 'middle'}}>{tbm.workName}</td>
                                </tr>
                                <tr className="h-10">
                                    <th className="border border-black bg-gray-100 text-center align-middle font-bold" style={{verticalAlign: 'middle'}}>작업장소</th>
                                    <td className="border border-black pl-2 align-middle" style={{verticalAlign: 'middle'}}>{tbm.location}</td>
                                    <th className="pdf-header-cell border border-black bg-gray-100 text-center align-middle font-bold text-xs" style={{verticalAlign: 'middle'}}><span className="pdf-header-text">위험성평가<br/>실시여부</span></th>
                                    <td className="border border-black pl-2 align-middle text-center" style={{verticalAlign: 'middle'}}>{tbm.riskAssessmentDone ? '☑ 예' : '☐ 아니오'}</td>
                                </tr>
                                <tr className="h-10">
                                    <th className="border border-black bg-gray-100 text-center align-middle font-bold" style={{verticalAlign: 'middle'}}>현장 환경</th>
                                    <td colSpan="3" className="border border-black pl-2 align-middle" style={{verticalAlign: 'middle'}}>
                                        <span className="mr-6"><strong>온도:</strong> {tbm.temperature || '-'}℃</span>
                                        <span><strong>습도:</strong> {tbm.humidity || '-'}%</span>
                                    </td>
                                </tr>
                                <tr>
                                    <th className="border border-black bg-gray-100 text-center align-middle font-bold" style={{verticalAlign: 'middle'}}>작업내용</th>
                                    <td colSpan="3" className="border border-black p-2 h-24 align-top whitespace-pre-wrap leading-normal" style={{verticalAlign: 'top'}}>{tbm.workDesc}</td>
                                </tr>
                            </tbody>
                        </table>

                        <div className="mb-6">
                            <h4 className="font-bold mb-2 border-l-4 border-black pl-2">1. 위험요인 및 대책</h4>
                            <table className="w-full border-collapse border border-black text-sm table-fixed" style={{ width: '100%', tableLayout: 'fixed', borderCollapse: 'collapse', borderSpacing: 0 }}>
                                <thead>
                                    <tr className="bg-gray-100">
                                        <th className="pdf-header-cell border border-black text-center align-middle" style={{width: '10%', verticalAlign: 'middle', padding: '6px 4px', lineHeight: 1.3}}><span className="pdf-header-text">No</span></th>
                                        <th className="pdf-header-cell border border-black text-center align-middle" style={{width: '45%', verticalAlign: 'middle', padding: '6px 4px', lineHeight: 1.3}}><span className="pdf-header-text">잠재위험요인</span></th>
                                        <th className="pdf-header-cell border border-black text-center align-middle" style={{width: '45%', verticalAlign: 'middle', padding: '6px 4px', lineHeight: 1.3}}><span className="pdf-header-text">안전대책</span></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {tbm.risks && tbm.risks.map((r, i) => (
                                        <tr key={i}>
                                            <td className="border border-black text-center align-middle" style={{verticalAlign: 'middle', padding: '6px 4px', lineHeight: 1.35}}>{i+1}</td>
                                            <td className="border border-black whitespace-pre-wrap" style={{verticalAlign: 'middle', padding: '6px 8px', lineHeight: 1.35, overflowWrap: 'anywhere'}}><span className="pdf-body-text">{r.factor}</span></td>
                                            <td className="border border-black whitespace-pre-wrap" style={{verticalAlign: 'middle', padding: '6px 8px', lineHeight: 1.35, overflowWrap: 'anywhere'}}><span className="pdf-body-text">{r.measure}</span></td>
                                        </tr>
                                    ))}
                                    {(!tbm.risks || tbm.risks.length === 0) && <tr><td colSpan="3" className="border border-black text-center" style={{padding: '10px 8px', lineHeight: 1.35}}>기록 없음</td></tr>}
                                </tbody>
                            </table>
                        </div>

                        <div className="mb-6">
                            <table className="w-full border-collapse border-2 border-black table-fixed">
                                <tbody>
                                    <tr>
                                        <th className="border border-black bg-gray-100 w-[15%] text-center align-middle font-bold" rowSpan="2" style={{verticalAlign: 'middle'}}>중점위험<br/>요인</th>
                                        <th className="border border-black w-[15%] text-center align-middle bg-gray-50" style={{verticalAlign: 'middle'}}>선정</th>
                                        <td className="border border-black p-2 align-middle font-bold whitespace-pre-wrap" style={{verticalAlign: 'middle'}}>{tbm.keyRiskFactor || '-'}</td>
                                    </tr>
                                    <tr>
                                        <th className="border border-black w-[15%] text-center align-middle bg-gray-50" style={{verticalAlign: 'middle'}}>대책</th>
                                        <td className="border border-black p-2 align-middle text-blue-700 whitespace-pre-wrap" style={{verticalAlign: 'middle'}}>{tbm.keyRiskMeasure || '-'}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>

                        <div className="mb-6">
                            <h4 className="font-bold mb-2 border-l-4 border-black pl-2">2. 작업 전 안전조치 확인</h4>
                            <table className="w-full border-collapse border border-black text-sm table-fixed" style={{ width: '100%', tableLayout: 'fixed', borderCollapse: 'collapse', borderSpacing: 0 }}>
                                <thead>
                                    <tr className="bg-gray-100">
                                        <th className="pdf-header-cell border border-black text-center align-middle" style={{width: '50%', verticalAlign: 'middle', padding: '6px 4px', lineHeight: 1.3}}><span className="pdf-header-text">잠재위험요소(중점위험 포함)</span></th>
                                        <th className="pdf-header-cell border border-black text-center align-middle" style={{width: '20%', verticalAlign: 'middle', padding: '6px 4px', lineHeight: 1.3}}><span className="pdf-header-text">조치여부</span></th>
                                        <th className="pdf-header-cell border border-black text-center align-middle" style={{width: '30%', verticalAlign: 'middle', padding: '6px 4px', lineHeight: 1.3}}><span className="pdf-header-text">'아니오'인 경우 조치내용</span></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {((tbm.safetyActionChecks && tbm.safetyActionChecks.length > 0)
                                        ? tbm.safetyActionChecks
                                        : (tbm.risks || []).filter(r => (r.factor || '').trim() !== '').map(r => ({
                                            risk: r.factor,
                                            result: r.result || 'yes',
                                            action: r.action || ''
                                        }))
                                    ).length > 0 ? (
                                        ((tbm.safetyActionChecks && tbm.safetyActionChecks.length > 0)
                                            ? tbm.safetyActionChecks
                                            : (tbm.risks || []).filter(r => (r.factor || '').trim() !== '').map(r => ({
                                                risk: r.factor,
                                                result: r.result || 'yes',
                                                action: r.action || ''
                                            }))
                                        ).map((check, i) => (
                                            <tr key={i}>
                                                <td className="border border-black whitespace-pre-wrap" style={{verticalAlign: 'middle', padding: '6px 8px', lineHeight: 1.35, overflowWrap: 'anywhere'}}><span className="pdf-body-text">{check.risk}</span></td>
                                                <td className="border border-black text-center align-middle" style={{verticalAlign: 'middle', padding: '6px 4px', lineHeight: 1.35}}>
                                                    <span className="pdf-body-text">{check.result === 'yes' ? '☑ 예' : '☐ 아니오'}</span>
                                                </td>
                                                <td className="border border-black whitespace-pre-wrap" style={{verticalAlign: 'middle', padding: '6px 8px', lineHeight: 1.35, overflowWrap: 'anywhere'}}>{check.action || '-'}</td>
                                            </tr>
                                        ))
                                    ) : (
                                        <tr><td colSpan="3" className="border border-black text-center text-gray-400" style={{padding: '8px 6px', lineHeight: 1.35}}>- 별도 기록 없음 -</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>

                        <div className="mb-6">
                            <h4 className="font-bold mb-2 border-l-4 border-black pl-2">3. 작업 전 일일 안전점검 시행 결과</h4>
                            <div className="border border-black p-2 min-h-[50px] whitespace-pre-wrap">
                                {tbm.dailyCheckResult || '특이사항 없음'}
                            </div>
                        </div>

                        {tbm.photoUrl && (
                            <div className="mb-6">
                                <h4 className="font-bold mb-2 border-l-4 border-black pl-2">4. TBM 활동 사진</h4>
                                <div className="border border-black p-2 flex justify-center">
                                    <img src={tbm.photoUrl} alt="활동사진" className="max-h-60 object-contain" />
                                </div>
                            </div>
                        )}

                        <div className="break-inside-avoid">
                            <h4 className="font-bold mb-2 border-l-4 border-black pl-2">5. 참석자 명단 (총 {tbm.attendees?.length || 0}명)</h4>
                            <table className="w-full border-collapse border-2 border-black table-fixed text-sm" style={{ width: '100%', tableLayout: 'fixed', borderCollapse: 'collapse', borderSpacing: 0 }}>
                                <thead>
                                    <tr className="bg-gray-100">
                                        <th className="pdf-header-cell border border-black text-center" style={{width: '25%', padding: '6px 4px', lineHeight: 1.3}}><span className="pdf-header-text">이름</span></th>
                                        <th className="pdf-header-cell border border-black text-center" style={{width: '25%', padding: '6px 4px', lineHeight: 1.3}}><span className="pdf-header-text">서명</span></th>
                                        <th className="pdf-header-cell border border-black text-center" style={{width: '25%', padding: '6px 4px', lineHeight: 1.3}}><span className="pdf-header-text">이름</span></th>
                                        <th className="pdf-header-cell border border-black text-center" style={{width: '25%', padding: '6px 4px', lineHeight: 1.3}}><span className="pdf-header-text">서명</span></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {(() => {
                                        const attendees = tbm.attendees || [];
                                        if (attendees.length === 0) {
                                            return (
                                                <tr>
                                                    <td colSpan="4" className="border border-black text-center text-gray-400" style={{padding: '12px 8px', lineHeight: 1.35}}>
                                                        참석자 기록 없음
                                                    </td>
                                                </tr>
                                            );
                                        }
                                        const rows = [];
                                        for (let i = 0; i < attendees.length; i += 2) {
                                            const left = attendees[i];
                                            const right = attendees[i + 1];
                                            rows.push(
                                                <tr key={i}>
                                                    <td className="border border-black h-16 align-middle text-center font-bold whitespace-pre-wrap break-words" style={{padding: '6px 8px', verticalAlign: 'middle', lineHeight: 1.35}}>{left?.name || '-'}</td>
                                                    <td className="border border-black h-16 align-middle text-center" style={{padding: '4px', verticalAlign: 'middle', lineHeight: 1.35}}>
                                                        {left?.isLeader ? (
                                                            left?.signatureUrl
                                                                ? <img src={left.signatureUrl} alt="서명" className="max-h-12 max-w-full object-contain mx-auto" />
                                                                : <span className="text-red-500 text-xs font-bold">(리더 미서명)</span>
                                                        ) : (
                                                            <span className="text-gray-500 text-xs">서명 생략(대표자 확인)</span>
                                                        )}
                                                    </td>
                                                    <td className="border border-black h-16 align-middle text-center font-bold whitespace-pre-wrap break-words" style={{padding: '6px 8px', verticalAlign: 'middle', lineHeight: 1.35}}>{right?.name || ''}</td>
                                                    <td className="border border-black h-16 align-middle text-center" style={{padding: '4px', verticalAlign: 'middle', lineHeight: 1.35}}>
                                                        {right ? (
                                                            right?.isLeader
                                                                ? (right?.signatureUrl
                                                                    ? <img src={right.signatureUrl} alt="서명" className="max-h-12 max-w-full object-contain mx-auto" />
                                                                    : <span className="text-red-500 text-xs font-bold">(리더 미서명)</span>)
                                                                : <span className="text-gray-500 text-xs">서명 생략(대표자 확인)</span>
                                                        ) : ''}
                                                    </td>
                                                </tr>
                                            );
                                        }
                                        return rows;
                                    })()}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Weekly Status Panel (Updated Logic: Sort Alphabetically) ---
        const WeeklyStatusPanel = ({ accounts, tbms, currentYear }) => {
            const [selectedWeek, setSelectedWeek] = useState(`${currentYear}-W${getWeekNumber(new Date())}`);
            
            useEffect(() => {
                setSelectedWeek(`${currentYear}-W${getWeekNumber(new Date())}`);
            }, [currentYear]);

            const weekOptions = useMemo(() => {
                const weeks = [];
                for(let i=1; i<=53; i++) {
                    const details = getWeekDetails(parseInt(currentYear), i);
                    if (details.startYear > parseInt(currentYear)) continue;
                    weeks.push(details);
                }
                return weeks;
            }, [currentYear]);

            const statusData = useMemo(() => {
                // Filter masters and Sort alphabetically (Ga-Na-Da)
                const deptList = accounts
                    .filter(a => a.role !== 'master')
                    .map(a => a.department)
                    .sort((a, b) => a.localeCompare(b, 'ko')); // Added sorting here for explicit order
                
                const selectedWeekNum = parseInt(selectedWeek.split('-W')[1]);
                
                const result = deptList.map(dept => {
                    const submitted = tbms.find(t => {
                        if (t.department !== dept) return false;
                        if (!t.date.startsWith(currentYear)) return false;
                        return getWeekNumber(new Date(t.date)) === selectedWeekNum;
                    });
                    return { department: dept, submitted: !!submitted, data: submitted };
                });
                return result;
            }, [accounts, tbms, selectedWeek, currentYear]);

            return (
                <div className="bg-indigo-50 border border-indigo-100 rounded-lg p-4 mb-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-4 gap-2">
                        <h3 className="font-bold text-indigo-800"><i className="fas fa-calendar-check mr-2"></i>주간 부서별 제출 현황</h3>
                        <select className="border border-indigo-200 rounded px-3 py-1 text-sm bg-white w-full sm:w-auto font-bold text-gray-700" value={selectedWeek} onChange={e=>setSelectedWeek(e.target.value)}>
                            {weekOptions.map(w => <option key={w.value} value={w.value}>{w.label}</option>)}
                        </select>
                    </div>
                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                        {statusData.map(s => (
                            <div key={s.department} className={`p-3 rounded border text-center transition flex flex-col items-center justify-center ${s.submitted ? 'bg-white border-green-200 shadow-sm' : 'bg-gray-50 border-red-200 opacity-80'}`}>
                                <div className="text-xs text-gray-500 mb-1">{s.department}</div>
                                {s.submitted ? (
                                    <div className="text-green-600 font-bold text-sm"><i className="fas fa-check-circle mr-1"></i>제출완료</div>
                                ) : (
                                    <div className="text-red-400 font-bold text-sm"><i className="fas fa-times-circle mr-1"></i>미제출</div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- Settings View (Master Only) ---
        const SettingsView = ({ availableYears, setAvailableYears }) => {
            const [newYear, setNewYear] = useState('');

            const handleAddYear = async () => {
                if (!newYear || availableYears.includes(newYear)) return;
                const updated = [...availableYears, newYear].sort();
                setAvailableYears(updated);
                await setDoc(doc(db, "system_settings", "config"), { years: updated });
                setNewYear('');
            };

            const handleRemoveYear = async (year) => {
                if (availableYears.length <= 1) return alert("최소 1개의 연도는 필요합니다.");
                const updated = availableYears.filter(y => y !== year);
                setAvailableYears(updated);
                await setDoc(doc(db, "system_settings", "config"), { years: updated });
            };

            return (
                <div className="bg-white p-8 rounded-xl shadow animate-fade-in-up">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6 border-b pb-2"><i className="fas fa-cog mr-2"></i>시스템 설정</h2>
                    <div className="mb-8">
                        <h3 className="font-bold text-lg mb-4 text-gray-700">📅 조회 연도 관리</h3>
                        <div className="flex gap-2 mb-4">
                            <input type="number" className="border rounded px-4 py-2 w-48" placeholder="예: 2027" value={newYear} onChange={e => setNewYear(e.target.value)} />
                            <button onClick={handleAddYear} className="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">추가</button>
                        </div>
                        <div className="flex flex-wrap gap-2">
                            {availableYears.map(year => (
                                <div key={year} className="bg-gray-100 px-4 py-2 rounded-full flex items-center gap-2 border">
                                    <span className="font-bold">{year}년</span>
                                    <button onClick={() => handleRemoveYear(year)} className="text-red-400 hover:text-red-600"><i className="fas fa-times-circle"></i></button>
                                </div>
                            ))}
                        </div>
                        <p className="text-sm text-gray-400 mt-2">* 이곳에서 설정한 연도만 대시보드와 이력 조회 필터에 표시됩니다.</p>
                    </div>
                </div>
            );
        };

        // --- View Components ---
        const LoginView = ({ loginId, setLoginId, loginPw, setLoginPw, handleLogin, saveId, setSaveId, loading }) => (
            <div className="min-h-screen flex items-center justify-center bg-transparent px-4">
                <div className="bg-white/95 p-8 rounded-3xl shadow-[0_16px_48px_rgba(15,23,42,0.12)] w-full max-w-md border border-blue-100">
                    <div className="text-center mb-8">
                        <div className="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl"><i className="fas fa-shield-alt"></i></div>
                        <h2 className="text-2xl font-bold text-gray-800">Smart TBM System</h2>
                        <p className="text-gray-500 mt-2 text-sm">안전한 작업을 위한 첫걸음</p>
                    </div>
                    <form onSubmit={handleLogin} className="space-y-6">
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">아이디 (부서코드)</label>
                            <input type="text" className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 transition outline-none" placeholder="admin or dept_id" value={loginId} onChange={e => setLoginId(e.target.value)} required />
                        </div>
                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                            <input type="password" className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 transition outline-none" placeholder="••••••" value={loginPw} onChange={e => setLoginPw(e.target.value)} required />
                        </div>
                        <div className="flex items-center">
                            <input id="saveId" type="checkbox" className="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" checked={saveId} onChange={e => setSaveId(e.target.checked)} />
                            <label htmlFor="saveId" className="ml-2 block text-sm text-gray-900">아이디 저장</label>
                        </div>
                        <button type="submit" className="w-full bg-blue-600 text-white py-3 rounded-xl hover:bg-blue-700 transition font-bold shadow-md transform active:scale-95">{loading ? <i className="fas fa-spinner fa-spin"></i> : '로그인'}</button>
                    </form>
                </div>
            </div>
        );

        const Sidebar = ({ user, view, setView, handleLogout, mobileMenuOpen, setMobileMenuOpen }) => (
            <div className={`w-64 bg-white/95 backdrop-blur-xl text-slate-700 h-[100dvh] fixed left-0 top-0 flex flex-col border-r border-blue-100 shadow-[0_8px_24px_rgba(15,23,42,0.08)] z-40 transform transition-transform duration-300 ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0`}>
                <div className="p-6 border-b border-blue-100">
                    <h1 className="text-xl font-bold tracking-wider text-blue-700"><i className="fas fa-hard-hat mr-2"></i>Smart TBM</h1>
                    <p className="text-xs text-slate-400 mt-1">Enterprise EHS System</p>
                </div>
                <div className="p-4 border-b border-blue-100 bg-blue-50/60">
                    <div className="flex items-center space-x-3">
                        <div className="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center text-lg font-bold">{user.department.substring(0,1)}</div>
                        <div>
                            <p className="font-medium text-sm">{user.department}</p>
                            <p className="text-xs text-slate-500 capitalize">{user.role}</p>
                        </div>
                    </div>
                </div>
                <nav className="flex-1 p-4 space-y-2 mt-2">
                    <button onClick={() => { setView('dashboard'); setMobileMenuOpen(false); }} className={`w-full text-left p-3 rounded-xl flex items-center transition ${view === 'dashboard' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-blue-50 hover:text-blue-700'}`}><i className="fas fa-chart-pie w-6"></i> 대시보드</button>
                    <button onClick={() => { setView('write'); setMobileMenuOpen(false); }} className={`w-full text-left p-3 rounded-xl flex items-center transition ${view === 'write' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-blue-50 hover:text-blue-700'}`}><i className="fas fa-edit w-6"></i> TBM 등록</button>
                    <button onClick={() => { setView('list'); setMobileMenuOpen(false); }} className={`w-full text-left p-3 rounded-xl flex items-center transition ${view === 'list' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-blue-50 hover:text-blue-700'}`}><i className="fas fa-list-alt w-6"></i> TBM 이력조회</button>
                    {user.role === 'master' && (
                        <>
                            <div className="my-4 border-t border-blue-100"></div>
                            <button onClick={() => { setView('admin'); setMobileMenuOpen(false); }} className={`w-full text-left p-3 rounded-xl flex items-center transition ${view === 'admin' ? 'bg-pink-600 text-white shadow-md' : 'text-pink-500 hover:bg-pink-50 hover:text-pink-700'}`}><i className="fas fa-users-cog w-6"></i> 계정/권한 관리</button>
                            <button onClick={() => { setView('settings'); setMobileMenuOpen(false); }} className={`w-full text-left p-3 rounded-xl flex items-center transition ${view === 'settings' ? 'bg-slate-600 text-white shadow-md' : 'text-slate-500 hover:bg-slate-100 hover:text-slate-700'}`}><i className="fas fa-cog w-6"></i> 시스템 설정</button>
                        </>
                    )}
                </nav>

                const risks = {};
                tbms.forEach(tbm => tbm.risks?.forEach(r => {
                    const key = (r.factor || "기타").split(' ')[0] || "기타";
                    risks[key] = (risks[key] || 0) + 1;
                }));
                return Object.entries(risks).map(([label, value]) => ({label, value}));

            // NOTE: deptRankingData Removed as per request

            // New: Calculate Safety Score based on Risk Assessment Rate
            const safetyScore = useMemo(() => {
                if (stats.total === 0) return 0;
                return Math.round((stats.safeCount / stats.total) * 100);

                if (score >= 70) return "양호합니다. 지속적인 위험 요인 발굴과 관심이 필요합니다.";

                        <KPICard title="위험성 평가 실시율" value={`${stats.total ? Math.round((stats.safeCount/stats.total)*100) : 0}%`} icon="fa-shield-virus" color="bg-green-500" subtext="목표치 95% 달성 중" />
                        <KPICard title="참여 작업자 수" value={`${tbms.reduce((acc, cur) => acc + (cur.attendees?.length || 0), 0)}명`} icon="fa-users" color="bg-purple-500" subtext="금일 현장 투입 인원" />
                    </div>

                    {/* Row 2: Monthly Activity (Full Width for 12 months) */}
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                        <h3 className="font-bold text-gray-700 mb-4 border-l-4 border-indigo-500 pl-3">월별 TBM 활동 추이 (연간)</h3>

                                                <button onClick={() => onEdit(tbm)} className="text-indigo-500 hover:bg-indigo-50 p-2 rounded text-xs border border-indigo-200"><i className="fas fa-edit"></i> 수정</button>
                                                <button onClick={() => onDelete(tbm.id)} className="text-red-500 hover:bg-red-50 p-2 rounded text-xs border border-red-200"><i className="fas fa-trash"></i> 삭제</button>

                                    </tr>

                            </tbody>
                        </table>
                    </div>
                    <div className="md:hidden p-4 space-y-3">
                        {filteredTbms.length === 0 ? (
                            <div className="p-4 text-center text-gray-400 border rounded-lg">{currentYear}년도 등록된 TBM 내역이 없습니다.</div>
                        ) : filteredTbms.map(tbm => (
                            <div key={tbm.id} className="border rounded-lg p-3 bg-white">
                                <div className="text-sm font-bold text-gray-700">{getFormattedWeek(tbm.date)}</div>
                                <div className="text-xs text-gray-400 mb-2">{tbm.date}</div>
                                <div className="text-sm text-indigo-600 font-bold mb-1">{tbm.department}</div>
                                <div className="text-sm font-medium text-gray-800 mb-1">{tbm.workName}</div>
                                <div className="text-sm text-gray-600 mb-3">리더: {tbm.leader}</div>
                                <div className="flex flex-wrap gap-2">
                                    <button onClick={() => onEdit(tbm)} className="text-indigo-500 hover:bg-indigo-50 px-3 py-1.5 rounded text-xs border border-indigo-200"><i className="fas fa-edit mr-1"></i>수정</button>
                                    <button onClick={() => onDelete(tbm.id)} className="text-red-500 hover:bg-red-50 px-3 py-1.5 rounded text-xs border border-red-200"><i className="fas fa-trash mr-1"></i>삭제</button>
                                    {user.role === 'master' && (
                                        <button onClick={() => onPdfDownload(tbm)} className="text-green-600 hover:bg-green-50 px-3 py-1.5 rounded text-xs border border-green-200"><i className="fas fa-file-pdf mr-1"></i>PDF</button>
                                    )}

                            </div>
                        ))}
