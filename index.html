    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, where, updateDoc, setDoc, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBYC9PUBg62xJi7L_C692VX6RwziN8B-GU",

            projectId: "dol-party",

    <style>
        :root {
            --g-bg: #f6f8fc;
            --g-panel: #ffffff;
            --g-text: #111827;
            --g-subtext: #5b6679;

    </style>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc, where, updateDoc, setDoc, getDocs, getDoc, signInAnonymously } = window.firebaseModules;
        const db = window.db;
        const auth = window.auth;
        const { jsPDF } = window.jspdf;

        // --- Utils (ISO 8601 Standard) ---
        const getWeekNumber = (d) => {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay()||7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
            const weekNo = Math.ceil(( ( (d - yearStart) / 86400000) + 1)/7);
            return weekNo;
        };

        const getFormattedWeek = (dateStr) => {
            const d = new Date(dateStr);
            const year = d.getFullYear();
            const month = d.getMonth() + 1;
            const firstDayOfMonth = new Date(year, month - 1, 1);
            const firstDayOfWeek = firstDayOfMonth.getDay();
            const offsetDate = d.getDate() + firstDayOfWeek - 1;
            const weekOfMonth = Math.floor(offsetDate / 7) + 1;
            return `${year}년 ${month}월 ${weekOfMonth}주차`;
        };

        const getLocalDateInputValue = () => {
            const now = new Date();
            const offsetMs = now.getTimezoneOffset() * 60000;
            return new Date(now.getTime() - offsetMs).toISOString().split('T')[0];
        };

        const hashPassword = async (plainText) => {
            const msgUint8 = new TextEncoder().encode(String(plainText || ''));
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            return Array.from(new Uint8Array(hashBuffer))
                .map((b) => b.toString(16).padStart(2, '0'))
                .join('');
        };

        const verifyPassword = async (inputPassword, account) => {
            const normalizedInput = String(inputPassword ?? '').trim();
            if (account?.passwordHash) {
                const hashed = await hashPassword(normalizedInput);
                return hashed === account.passwordHash;
            }
            // Legacy fallback for old documents (plain password)
            const legacyCandidates = [
                account?.password,
                account?.pw,
                account?.pass
            ];
            return legacyCandidates.some((v) => {
                if (v === undefined || v === null) return false;
                return normalizedInput === String(v).trim();
            });
        };

        // FIXED: ISO 8601 compliant week date range calculator
        const getWeekDetails = (year, weekNo) => {
            // ISO Week 1 is the week with the first Thursday of the year (Jan 4th is always in Week 1)
            const jan4 = new Date(year, 0, 4);
            const day = jan4.getDay() || 7; // Mon=1, Sun=7
            const week1Start = new Date(jan4);
            week1Start.setDate(jan4.getDate() - day + 1); // Start of ISO Week 1 (Monday)

            // Calculate start date of the requested week
            const start = new Date(week1Start);
            start.setDate(week1Start.getDate() + (weekNo - 1) * 7);
            
            const end = new Date(start);
            end.setDate(start.getDate() + 6);
            
            // Format dates
            const fmt = (date) => `${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
            
            // Determine month for label (based on Thursday of the week to handle month overlap)
            const thursday = new Date(start);
            thursday.setDate(start.getDate() + 3);
            const month = thursday.getMonth() + 1;
            
            // Simple visual "Week of Month" for the label
            const weekOfMonth = Math.ceil(start.getDate() / 7);

            return {
                startYear: start.getFullYear(),
                label: `${year}년 ${month}월 ${weekOfMonth}주차 (${fmt(start)}~${fmt(end)})`,
                value: `${year}-W${weekNo}`
            };
        };

        // --- Error Boundary ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex flex-col items-center justify-center h-screen bg-red-50 text-red-800 p-8">
                            <i className="fas fa-exclamation-triangle text-6xl mb-4"></i>
                            <h1 className="text-3xl font-bold mb-2">시스템 오류 발생</h1>
                            <p className="mb-6 text-center max-w-md">일시적인 오류가 발생했습니다.<br/>(Error: {this.state.error.message})</p>
                            <button onClick={() => window.location.reload()} className="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition shadow-lg">재시작</button>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- Helper Components ---
        const Toast = ({ message, type, onClose }) => {
            useEffect(() => {
                const timer = setTimeout(onClose, 3000);
                return () => clearTimeout(timer);
            }, []);
            const bgClass = type === 'success' ? 'bg-emerald-600' : type === 'error' ? 'bg-rose-600' : 'bg-sky-700';
            return (
                <div className={`fixed top-4 left-1/2 -translate-x-1/2 sm:left-auto sm:translate-x-0 sm:right-5 ${bgClass} text-white px-4 sm:px-6 py-3 rounded-2xl shadow-[0_14px_32px_rgba(15,23,42,0.22)] z-50 flex items-center animate-bounce-in max-w-[calc(100vw-1.5rem)] border border-white/15`}>
                    <i className={`fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} mr-3`}></i>
                    {message}
                </div>
            );
        };

        // --- Chart Components ---
        const KPICard = ({ title, value, icon, color, subtext }) => {
            const iconTextClassMap = {
                'bg-blue-500': 'text-blue-600',
                'bg-green-500': 'text-green-600',
                'bg-purple-500': 'text-purple-600',
                'bg-pink-500': 'text-pink-600'
            };
            const iconTextClass = iconTextClassMap[color] || 'text-indigo-600';
            return (
                <div className="brand-stat-card p-6 hover:-translate-y-0.5 transition-all duration-200">
                    <div className="flex justify-between items-start">
                        <div>
                            <p className="text-sm subtle-text mb-1 font-semibold tracking-tight">{title}</p>
                            <h3 className="text-3xl font-extrabold text-slate-900 tracking-tight">{value}</h3>
                        </div>
                        <div className={`p-3 rounded-2xl ${color} bg-opacity-10 ${iconTextClass} shadow-inner`}>
                            <i className={`fas ${icon} text-xl`}></i>
                        </div>
                    </div>
                    <p className="muted-note mt-4">{subtext}</p>
                </div>
            );
        };

        const SimpleBarChart = ({ data }) => {
            const values = data.map(d => d.value);
            const maxVal = Math.max(...values);
            const scaleMax = maxVal === 0 ? 5 : maxVal <= 5 ? maxVal + 2 : maxVal * 1.2;
            
            return (
                <div className="h-64 flex items-end justify-around space-x-2 pt-10 border-b border-slate-200 bg-[linear-gradient(180deg,rgba(37,99,235,0.04),transparent)] rounded-2xl px-2">
                    {data.map((d, i) => (
                        <div key={i} className="flex flex-col items-center w-full group">
                            <div className="relative w-full flex justify-center h-full items-end">
                                <div className="absolute -top-8 bg-slate-900 text-white text-xs px-2 py-1 rounded-xl opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                    {d.value}건
                                </div>
                                <div 
                                    className="w-3/5 bg-gradient-to-t from-sky-700 via-sky-500 to-cyan-300 rounded-t-[14px] hover:brightness-105 transition-all duration-500 relative shadow-[0_10px_20px_rgba(14,116,144,0.16)]"
                                    style={{ height: `${(d.value / scaleMax) * 100}%`, minHeight: d.value > 0 ? '6px' : '0' }}
                                >
                                    <div className="absolute inset-x-1 top-1 h-2 rounded-full bg-white/35"></div>
                                </div>
                            </div>
                            <span className="text-xs text-slate-600 mt-2 font-semibold">{d.label}</span>
                        </div>
                    ))}
                </div>
            );
        };

        const DonutChart = ({ data }) => {
            const total = data.reduce((acc,cur) => acc + cur.value, 0); 
            const renderTotal = total || 1; // Prevent division by zero only for scale calculation
            const colors = ['#6366f1', '#ec4899', '#10b981', '#f59e0b'];
            
            return (
                <div className="flex flex-col items-center justify-center pt-2">
                    <div className="relative w-40 h-40 rounded-full border-8 border-slate-100 flex items-center justify-center shadow-inner bg-[radial-gradient(circle_at_top,rgba(15,108,189,0.08),transparent_58%)]">
                        {/* Only show color if there is actual data */}
                        {total > 0 && (
                            <div className="absolute inset-0 rounded-full opacity-35 bg-[conic-gradient(at_center,_var(--tw-gradient-stops))] from-sky-500 via-cyan-400 via-40% to-emerald-400"></div>
                        )}
                        <div className="text-center">
                            <div className="text-2xl font-extrabold text-slate-900">{total}</div>
                            <div className="text-xs text-slate-500">합계</div>
                        </div>
                    </div>
                    <div className="mt-6 w-full space-y-2">
                        {total === 0 ? (
                            <div className="text-center text-sm text-slate-400 py-4">등록된 데이터가 없습니다.</div>
                        ) : (
                            data.slice(0,4).map((d, i) => (
                                <div key={i} className="flex justify-between text-sm px-4 py-1.5 rounded-xl hover:bg-slate-50">
                                    <span className="flex items-center"><span className="w-3 h-3 rounded-full mr-2" style={{backgroundColor: colors[i%4]}}></span>{d.label}</span>
                                    <span className="font-bold">{Math.round((d.value/renderTotal)*100)}%</span>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const RiskGauge = ({ score }) => {
            const rotation = (score / 100) * 180;
            const color = score > 80 ? '#22c55e' : score > 50 ? '#eab308' : '#ef4444';
            return (
                <div className="relative w-48 h-24 overflow-hidden mx-auto mt-4">
                    <div className="absolute top-0 left-0 w-full h-full bg-gray-200 rounded-t-full"></div>
                    <div className="absolute top-0 left-0 w-full h-full rounded-t-full origin-bottom transform transition-transform duration-1000 ease-out" style={{ background: color, transform: `rotate(${rotation - 180}deg)` }}></div>
                    <div className="absolute bottom-0 left-1/2 transform -translate-x-1/2 translate-y-1/2 w-32 h-32 bg-white rounded-full flex items-center justify-center border-4 border-gray-100">
                        <span className="text-2xl font-bold -mt-8 text-gray-700">{score}점</span>
                    </div>
                </div>
            );
        };

        // --- Signature Pad Component ---
        const SignatureModal = ({ isOpen, onClose, onSave, signerName }) => {
            const canvasRef = useRef(null);
            const isDrawing = useRef(false);
            const pointsRef = useRef([]);
            const MIN_MOVE_DISTANCE = 2.6;
            const STROKE_SMOOTHING = 0.42;
            const [hasSigned, setHasSigned] = useState(false);

            useEffect(() => {
                if (isOpen && canvasRef.current) {
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    ctx.lineWidth = 3;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = 'black';
                    ctx.lineJoin = 'round';
                    
                    setTimeout(() => {
                        const rect = canvas.getBoundingClientRect();
                        canvas.width = rect.width;
                        canvas.height = rect.height;
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }, 50);
                    
                    pointsRef.current = [];
                    setHasSigned(false);
                }
            }, [isOpen]);

            const getPos = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                return {
                    x: (clientX - rect.left) * scaleX,
                    y: (clientY - rect.top) * scaleY
                };
            };

            const distance = (a, b) => {
                const dx = a.x - b.x;
                const dy = a.y - b.y;
                return Math.sqrt(dx * dx + dy * dy);
            };

            const midPoint = (a, b) => ({ x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 });

            const startDrawing = (e) => {
                e.preventDefault();
                isDrawing.current = true;
                const { x, y } = getPos(e);
                pointsRef.current = [{ x, y }];
                const ctx = canvasRef.current.getContext('2d');

                // tap 입력도 보이도록 시작점 표시
                ctx.beginPath();
                ctx.arc(x, y, ctx.lineWidth * 0.45, 0, Math.PI * 2);
                ctx.fillStyle = ctx.strokeStyle;
                ctx.fill();
                setHasSigned(true);
            };

            const draw = (e) => {
                if (!isDrawing.current) return;
                e.preventDefault();

                const { x, y } = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                const prev = pointsRef.current[pointsRef.current.length - 1];

                let current = { x, y };
                if (prev) {
                    current = {
                        x: prev.x + (x - prev.x) * STROKE_SMOOTHING,
                        y: prev.y + (y - prev.y) * STROKE_SMOOTHING,
                    };
                }

                if (prev && distance(prev, current) < MIN_MOVE_DISTANCE) return;

                pointsRef.current.push(current);

                if (pointsRef.current.length < 3) {
                    ctx.beginPath();
                    ctx.moveTo(prev.x, prev.y);
                    ctx.lineTo(current.x, current.y);
                    ctx.stroke();
                    return;
                }

                const p0 = pointsRef.current[pointsRef.current.length - 3];
                const p1 = pointsRef.current[pointsRef.current.length - 2];
                const p2 = pointsRef.current[pointsRef.current.length - 1];
                const m1 = midPoint(p0, p1);
                const m2 = midPoint(p1, p2);

                ctx.beginPath();
                ctx.moveTo(m1.x, m1.y);
                ctx.quadraticCurveTo(p1.x, p1.y, m2.x, m2.y);
                ctx.stroke();
                setHasSigned(true);
            };

            const stopDrawing = () => {
                isDrawing.current = false;
                pointsRef.current = [];
            };

            const handleSave = () => {
                if (!hasSigned) return;
                const dataUrl = canvasRef.current.toDataURL();
                onSave(dataUrl);
                onClose();
            };

            const handleClear = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pointsRef.current = [];
                setHasSigned(false);
            };

            if (!isOpen) return null;

            const modalUi = (
                <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col">
                        <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl">

                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600"><i className="fas fa-times text-xl"></i></button>
                        </div>
                        <div className="p-4 bg-gray-100 flex-1 relative h-64">
                            <canvas
                                ref={canvasRef}
                                style={{width: '100%', height: '100%'}}
                                className="bg-white rounded border border-gray-300 shadow-inner block cursor-crosshair"
                                onMouseDown={startDrawing}
                                onMouseMove={draw}
                                onMouseUp={stopDrawing}
                                onMouseLeave={stopDrawing}
                                onTouchStart={startDrawing}
                                onTouchMove={draw}
                                onTouchEnd={stopDrawing}
                            />
                            {!hasSigned && <div className="absolute inset-0 flex items-center justify-center pointer-events-none opacity-30 text-2xl font-bold text-gray-400">서명해 주세요</div>}
                        </div>
                        <div className="p-4 border-t flex justify-between gap-3">
                            <button onClick={handleClear} className="px-4 py-2 border border-gray-300 text-gray-600 rounded hover:bg-gray-50"><i className="fas fa-eraser mr-1"></i> 지우기</button>
                            <div className="flex gap-2">
                                <button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded">취소</button>
                                <button onClick={handleSave} disabled={!hasSigned} className={`px-6 py-2 text-white rounded font-bold shadow ${!hasSigned ? 'bg-gray-400 cursor-not-allowed' : 'bg-indigo-600 hover:bg-indigo-700'}`}>서명 완료</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            return ReactDOM.createPortal(modalUi, document.body);
        };

        // --- Hidden PDF Generator (Auto Download - Fixed Layout) ---
        const PdfHiddenGenerator = ({ tbm, onComplete }) => {
            const pageRefs = useRef([]);
            pageRefs.current = [];

            const chunkArray = (items, chunkSize) => {
                const source = Array.isArray(items) ? items : [];
                if (source.length === 0) return [[]];
                const chunks = [];
                for (let i = 0; i < source.length; i += chunkSize) {
                    chunks.push(source.slice(i, i + chunkSize));
                }
                return chunks;
            };

            const riskRows = (tbm.risks && tbm.risks.length > 0) ? tbm.risks : [];
            const safetyChecks = ((tbm.safetyActionChecks && tbm.safetyActionChecks.length > 0)
                ? tbm.safetyActionChecks
                : (tbm.risks || []).filter(r => (r.factor || '').trim() !== '').map(r => ({
                    risk: r.factor,
                    result: r.result || 'yes',
                    action: r.action || ''
                }))
            );
            const attendeePairs = [];
            const attendees = tbm.attendees || [];
            for (let i = 0; i < attendees.length; i += 2) {
                attendeePairs.push([attendees[i], attendees[i + 1]]);
            }

            const riskChunks = chunkArray(riskRows, 8);
            const safetyChunks = chunkArray(safetyChecks, 7);
            const attendeeChunks = attendeePairs.length > 0 ? chunkArray(attendeePairs, 6) : [[null]];
            
            useEffect(() => {
                const generate = async () => {
                    const pageNodes = pageRefs.current.filter(Boolean);
                    if (pageNodes.length === 0) return;
                    try {
                        if (document.fonts && document.fonts.ready) {
                            await document.fonts.ready;
                        }
                        await new Promise(resolve => setTimeout(resolve, 500));
                        const pdf = new jsPDF('p', 'mm', 'a4');
                        const pageWidth = pdf.internal.pageSize.getWidth();
                        const pageHeight = pdf.internal.pageSize.getHeight();

                        for (let i = 0; i < pageNodes.length; i += 1) {
                            const node = pageNodes[i];
                            const canvas = await html2canvas(node, {
                                scale: 2,
                                useCORS: true,
                                backgroundColor: '#ffffff',
                                width: node.scrollWidth,
                                height: node.scrollHeight,
                                windowWidth: node.scrollWidth,
                                windowHeight: node.scrollHeight
                            });
                            const imgData = canvas.toDataURL('image/jpeg', 0.92);
                            if (i > 0) pdf.addPage();
                            pdf.addImage(imgData, 'JPEG', 0, 0, pageWidth, pageHeight);
                        }
                        const totalPages = pdf.getNumberOfPages();
                        for (let page = 1; page <= totalPages; page += 1) {
                            pdf.setPage(page);
                            pdf.setFontSize(9);
                            pdf.setTextColor(120, 130, 150);
                            pdf.text(`${page} / ${totalPages}`, pageWidth - 18, pageHeight - 8, { align: 'right' });
                        }
                        pdf.save(`TBM_${tbm.date}_${tbm.department}.pdf`);
                        onComplete({ ok: true });
                    } catch (e) {
                        console.error("PDF Gen Error", e);
                        onComplete({ ok: false, error: e });
                    } finally {
                    }
                };
                generate();
            }, []);

            return (

                                </tbody>

                        <div className="mb-6">
                            <table className="w-full border-collapse border-2 border-black table-fixed">

                        </div>
                    ))}

                    {safetyChunks.slice(1).map((chunk, chunkIdx) => (
                        <div
                            key={`safety-page-${chunkIdx}`}
                            ref={(node) => { pageRefs.current[riskChunks.length + chunkIdx] = node; }}
                            className="pdf-doc bg-white p-8 text-black w-[210mm] min-h-[297mm] text-sm leading-relaxed border border-gray-300 font-sans"
                            style={{ boxSizing: 'border-box' }}
                        >
                            <h1 className="text-2xl font-bold text-center mb-8 pb-4 border-b-2 border-black">Tool Box Meeting 회의록</h1>
                            <div className="mb-6">
                                <h4 className="font-bold mb-2 border-l-4 border-black pl-2">2. 작업 전 안전조치 확인 (계속)</h4>
                                <table className="w-full border-collapse border border-black text-sm table-fixed" style={{ width: '100%', tableLayout: 'fixed', borderCollapse: 'collapse', borderSpacing: 0 }}>
                                    <thead>

                                                    <td className="border border-black h-16 align-middle text-center" style={{padding: '4px', verticalAlign: 'middle', lineHeight: 1.35}}>
                                                        {left?.isLeader ? (
                                                            left?.signatureUrl
                                                                ? <img src={left.signatureUrl} alt="서명" className="max-h-12 max-w-full object-contain mx-auto" />
                                                                : <span className="text-red-500 text-xs font-bold">(리더 미서명)</span>
                                                        ) : (
                                                            <span className="text-gray-500 text-xs">서명 생략(대표자 확인)</span>
                                                        )}
                                                    </td>
                                                    <td className="border border-black h-16 align-middle text-center font-bold whitespace-pre-wrap break-words" style={{padding: '6px 8px', verticalAlign: 'middle', lineHeight: 1.35}}>{right?.name || ''}</td>
                                                    <td className="border border-black h-16 align-middle text-center" style={{padding: '4px', verticalAlign: 'middle', lineHeight: 1.35}}>
                                                        {right ? (
                                                            right?.isLeader
                                                                ? (right?.signatureUrl
                                                                    ? <img src={right.signatureUrl} alt="서명" className="max-h-12 max-w-full object-contain mx-auto" />
                                                                    : <span className="text-red-500 text-xs font-bold">(리더 미서명)</span>)
                                                                : <span className="text-gray-500 text-xs">서명 생략(대표자 확인)</span>
                                                        ) : ''}
                                                    </td>
                                                </tr>
                                            );

                                            <tr>
                                                <td colSpan="4" className="border border-black text-center text-gray-400" style={{padding: '12px 8px', lineHeight: 1.35}}>
                                                    참석자 기록 없음

                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        // --- Weekly Status Panel (Updated Logic: Sort Alphabetically) ---
        const SectionHero = ({ chip, title, subtitle, actions, dark = false }) => (
            <div className={dark ? "brand-shell brand-grid rounded-[2rem] p-6 sm:p-8 text-white shadow-[0_18px_40px_rgba(8,18,38,0.14)]" : "view-header"}>
                <div className={dark ? "flex-1" : "view-header-primary"}>
                    {chip && (dark ? <div className="brand-kicker mb-3">{chip}</div> : <div className="hero-chip">{chip}</div>)}
                    <div className={dark ? "flex flex-wrap items-center gap-3 mb-3" : ""}>
                        <h2 className={dark ? "display-title text-4xl font-extrabold tracking-tight leading-none" : "view-title"}>{title}</h2>
                    </div>
                    {subtitle && <p className={dark ? "text-white/90 mt-2" : "view-subtitle"}>{subtitle}</p>}
                </div>
                {actions && <div className={dark ? "flex flex-wrap items-center gap-2 sm:gap-3" : "flex flex-wrap items-center gap-2"}>{actions}</div>}
            </div>
        );

        const WeeklyStatusPanel = ({ accounts, tbms, currentYear }) => {
            const [selectedWeek, setSelectedWeek] = useState(`${currentYear}-W${getWeekNumber(new Date())}`);
            
            useEffect(() => {
                setSelectedWeek(`${currentYear}-W${getWeekNumber(new Date())}`);
            }, [currentYear]);

            const weekOptions = useMemo(() => {
                const weeks = [];
                for(let i=1; i<=53; i++) {
                    const details = getWeekDetails(parseInt(currentYear), i);
                    if (details.startYear > parseInt(currentYear)) continue;
                    weeks.push(details);
                }
                return weeks;
            }, [currentYear]);

            const statusData = useMemo(() => {
                // Filter masters and Sort alphabetically (Ga-Na-Da)
                const deptList = accounts
                    .filter(a => a.role !== 'master')
                    .map(a => a.department)
                    .sort((a, b) => a.localeCompare(b, 'ko')); // Added sorting here for explicit order
                
                const selectedWeekNum = parseInt(selectedWeek.split('-W')[1]);
                
                const result = deptList.map(dept => {
                    const submitted = tbms.find(t => {
                        if (t.department !== dept) return false;
                        if (!t.date.startsWith(currentYear)) return false;
                        return getWeekNumber(new Date(t.date)) === selectedWeekNum;
                    });
                    return { department: dept, submitted: !!submitted, data: submitted };
                });
                return result;
            }, [accounts, tbms, selectedWeek, currentYear]);

            return (
                <div className="tone-panel rounded-[1.4rem] p-5 mb-6">

                                {s.submitted ? (
                                    <div className="text-emerald-700 font-bold text-sm"><i className="fas fa-check-circle mr-1"></i>제출완료</div>
                                ) : (
                                    <div className="text-rose-500 font-bold text-sm"><i className="fas fa-times-circle mr-1"></i>미제출</div>

        };

        // --- Settings View (Master Only) ---
        const SettingsView = ({ availableYears, setAvailableYears }) => {
            const [newYear, setNewYear] = useState('');

            const handleAddYear = async () => {
                if (!newYear || availableYears.includes(newYear)) return;
                const updated = [...availableYears, newYear].sort();
                setAvailableYears(updated);
                await setDoc(doc(db, "system_settings", "config"), { years: updated });
                setNewYear('');
            };

            const handleRemoveYear = async (year) => {
                if (availableYears.length <= 1) return alert("최소 1개의 연도는 필요합니다.");
                const updated = availableYears.filter(y => y !== year);
                setAvailableYears(updated);
                await setDoc(doc(db, "system_settings", "config"), { years: updated });
            };

            return (
                <div className="tone-panel rounded-[1.6rem] animate-fade-in-up overflow-hidden">
                    <SectionHero chip={<><i className="fas fa-sliders"></i> 시스템 관리</>} title="시스템 설정" subtitle="조회 연도와 기본 운영 값을 관리합니다" />
                    <div className="p-6 sm:p-8">
                    <div className="mb-8">
                        <h3 className="font-bold text-lg mb-4 text-slate-700">📅 조회 연도 관리</h3>
                        <div className="flex gap-2 mb-4">
                            <input type="number" className="input-field w-48" placeholder="예: 2027" value={newYear} onChange={e => setNewYear(e.target.value)} />
                            <button onClick={handleAddYear} className="px-4 py-2 rounded-xl bg-gradient-to-r from-sky-700 to-cyan-600 text-white font-bold shadow-sm hover:brightness-105">추가</button>
                        </div>
                        <div className="flex flex-wrap gap-2">
                            {availableYears.map(year => (
                                <div key={year} className="bg-white px-4 py-2 rounded-full flex items-center gap-2 border border-slate-200 shadow-sm">
                                    <span className="font-bold text-slate-800">{year}년</span>
                                    <button onClick={() => handleRemoveYear(year)} className="text-rose-400 hover:text-rose-600"><i className="fas fa-times-circle"></i></button>
                                </div>
                            ))}
                        </div>
                        <p className="muted-note mt-2">* 이곳에서 설정한 연도만 대시보드와 이력 조회 필터에 표시됩니다.</p>
                    </div>
                    </div>
                </div>
            );
        };

        // --- View Components ---
        const LoginView = ({ loginId, setLoginId, loginPw, setLoginPw, handleLogin, saveId, setSaveId, loading }) => (
            <div className="min-h-screen flex items-center justify-center bg-transparent px-4">
                <div className="tone-panel p-3 sm:p-4 rounded-[2.2rem] w-full max-w-md brand-ring">
                    <div className="brand-shell brand-grid rounded-[1.8rem] p-7 sm:p-8 text-white">
                        <div className="brand-kicker mb-4"><i className="fas fa-wave-square"></i> 안전 운영</div>
                        <div className="flex items-start justify-between gap-4">
                            <div>
                                <h2 className="display-title text-[2rem] leading-none font-extrabold tracking-tight">스마트 TBM</h2>
                                <p className="mt-3 text-sm text-white/78">현장 안전 운영을 빠르게 기록하고 확인합니다</p>
                            </div>
                            <div className="w-14 h-14 rounded-[1.2rem] brand-outline flex items-center justify-center text-xl shrink-0">
                                <i className="fas fa-shield-halved"></i>

                        <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                            <input type="password" className="input-field" placeholder="••••••" value={loginPw} onChange={e => setLoginPw(e.target.value)} required />
                        </div>
                        <div className="flex items-center">
                            <input id="saveId" type="checkbox" className="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500" checked={saveId} onChange={e => setSaveId(e.target.checked)} />
                            <label htmlFor="saveId" className="ml-2 block text-sm text-gray-900">아이디 저장</label>
                        </div>
                        <button type="submit" className="w-full brand-button text-white py-3.5 rounded-[1.1rem] transition font-bold transform active:scale-[0.985]">{loading ? <i className="fas fa-spinner fa-spin"></i> : '로그인'}</button>
                    </form>
                </div>
            </div>
        );

        const Sidebar = ({ user, view, setView, handleLogout, mobileMenuOpen, setMobileMenuOpen }) => (
            <div className={`w-64 bg-slate-950 backdrop-blur-2xl text-slate-100 h-[100dvh] fixed left-0 top-0 flex flex-col border-r border-white/8 shadow-[0_18px_36px_rgba(2,6,23,0.28)] z-40 transform transition-transform duration-300 ${mobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0`}>
                <div className="p-6 border-b border-white/10 brand-grid">
                    <div className="brand-kicker mb-3"><i className="fas fa-shield-alt"></i> 스마트 TBM</div>
                    <h1 className="display-title text-2xl font-extrabold tracking-tight text-white"><i className="fas fa-hard-hat mr-2 text-sky-300"></i>스마트 TBM</h1>
                    <p className="text-xs text-white/78 mt-1">통합 안전관리 시스템</p>
                </div>
                <div className="p-4 border-b border-white/10 bg-white/5">
                    <div className="flex items-center space-x-3">
                        <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-[#2a7fff] via-[#0d63f3] to-[#ff7a18] text-white flex items-center justify-center text-lg font-bold shadow-lg">{user.department.substring(0,1)}</div>
                        <div>
                            <p className="font-medium text-sm text-white">{user.department}</p>
                            <p className="text-xs text-white/78">{user.role === 'master' ? '관리자' : '사용자'}</p>
                        </div>
                    </div>
                </div>
                <nav className="flex-1 p-4 space-y-2 mt-2">
                    <button onClick={() => { setView('dashboard'); setMobileMenuOpen(false); }} className={`w-full text-left p-3.5 rounded-2xl flex items-center transition ${view === 'dashboard' ? 'bg-slate-800 text-white border border-sky-400/35 shadow-[inset_0_1px_0_rgba(255,255,255,0.04)]' : 'text-slate-200 hover:bg-white/8 hover:text-white'}`}><i className={`fas fa-chart-pie w-6 ${view === 'dashboard' ? 'text-sky-300' : 'text-slate-300'}`}></i> 대시보드</button>
                    <button onClick={() => { setView('write'); setMobileMenuOpen(false); }} className={`w-full text-left p-3.5 rounded-2xl flex items-center transition ${view === 'write' ? 'bg-slate-800 text-white border border-sky-400/35 shadow-[inset_0_1px_0_rgba(255,255,255,0.04)]' : 'text-slate-200 hover:bg-white/8 hover:text-white'}`}><i className={`fas fa-edit w-6 ${view === 'write' ? 'text-sky-300' : 'text-slate-300'}`}></i> TBM 등록</button>
                    <button onClick={() => { setView('today'); setMobileMenuOpen(false); }} className={`w-full text-left p-3.5 rounded-2xl flex items-center transition ${view === 'today' ? 'bg-slate-800 text-white border border-sky-400/35 shadow-[inset_0_1px_0_rgba(255,255,255,0.04)]' : 'text-slate-200 hover:bg-white/8 hover:text-white'}`}><i className={`fas fa-calendar-day w-6 ${view === 'today' ? 'text-sky-300' : 'text-slate-300'}`}></i> 오늘 작업</button>
                    <button onClick={() => { setView('list'); setMobileMenuOpen(false); }} className={`w-full text-left p-3.5 rounded-2xl flex items-center transition ${view === 'list' ? 'bg-slate-800 text-white border border-sky-400/35 shadow-[inset_0_1px_0_rgba(255,255,255,0.04)]' : 'text-slate-200 hover:bg-white/8 hover:text-white'}`}><i className={`fas fa-list-alt w-6 ${view === 'list' ? 'text-sky-300' : 'text-slate-300'}`}></i> TBM 이력조회</button>
                    <button onClick={() => { setView('risks'); setMobileMenuOpen(false); }} className={`w-full text-left p-3.5 rounded-2xl flex items-center transition ${view === 'risks' ? 'bg-slate-800 text-white border border-sky-400/35 shadow-[inset_0_1px_0_rgba(255,255,255,0.04)]' : 'text-slate-200 hover:bg-white/8 hover:text-white'}`}><i className={`fas fa-triangle-exclamation w-6 ${view === 'risks' ? 'text-sky-300' : 'text-slate-300'}`}></i> 미조치 위험</button>
                    <button onClick={() => { setView('drafts'); setMobileMenuOpen(false); }} className={`w-full text-left p-3.5 rounded-2xl flex items-center transition ${view === 'drafts' ? 'bg-slate-800 text-white border border-sky-400/35 shadow-[inset_0_1px_0_rgba(255,255,255,0.04)]' : 'text-slate-200 hover:bg-white/8 hover:text-white'}`}><i className={`fas fa-floppy-disk w-6 ${view === 'drafts' ? 'text-sky-300' : 'text-slate-300'}`}></i> 임시저장 문서</button>
                    {user.role === 'master' && (
                        <>
                            <div className="my-4 border-t border-white/10"></div>
                            <button onClick={() => { setView('admin'); setMobileMenuOpen(false); }} className={`w-full text-left p-3 rounded-xl flex items-center transition ${view === 'admin' ? 'bg-fuchsia-700 text-white shadow-md' : 'text-fuchsia-100 hover:bg-fuchsia-500/10 hover:text-white'}`}><i className={`fas fa-users-cog w-6 ${view === 'admin' ? 'text-white' : 'text-fuchsia-200'}`}></i> 계정/권한 관리</button>
                            <button onClick={() => { setView('settings'); setMobileMenuOpen(false); }} className={`w-full text-left p-3 rounded-xl flex items-center transition ${view === 'settings' ? 'bg-slate-700 text-white shadow-md' : 'text-slate-200 hover:bg-white/8 hover:text-white'}`}><i className={`fas fa-cog w-6 ${view === 'settings' ? 'text-white' : 'text-slate-300'}`}></i> 시스템 설정</button>
                        </>
                    )}
                </nav>
                <div className="p-4 border-t border-white/10">
                    <button onClick={() => { setMobileMenuOpen(false); handleLogout(); }} className="w-full py-2.5 px-4 border border-white/12 rounded-xl text-slate-100 hover:bg-white/8 transition flex items-center justify-center text-sm"><i className="fas fa-sign-out-alt mr-2 text-slate-300"></i> 로그아웃</button>
                </div>
            </div>
        );

        const DashboardView = ({ stats, tbms, currentYear, setCurrentYear, allTbms, availableYears }) => {
            const riskCategoryData = useMemo(() => {
                const risks = {};
                tbms.forEach(tbm => tbm.risks?.forEach(r => {
                    const key = (r.factor || "기타").split(' ')[0] || "기타";
                    risks[key] = (risks[key] || 0) + 1;
                }));
                return Object.entries(risks).map(([label, value]) => ({label, value}));
            }, [tbms]);

            const dashboardActions = useMemo(() => {
                const currentYearTbms = tbms.filter(t => String(t.date || '').startsWith(currentYear));
                const departments = Array.from(new Set(currentYearTbms.map(t => t.department).filter(Boolean)));
                const submittedDeptCount = departments.length;
                const noActionRiskCount = currentYearTbms.reduce((acc, tbm) => acc + (tbm.risks || []).filter(r => (r.result || 'yes') === 'no').length, 0);
                const todayStr = getLocalDateInputValue();
                const todayCount = currentYearTbms.filter(t => t.date === todayStr).length;
                const now = new Date();
                const day = now.getDay() || 7;
                const weekStart = new Date(now);
                weekStart.setHours(0, 0, 0, 0);
                weekStart.setDate(now.getDate() - day + 1);
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekStart.getDate() + 7);
                const weekCount = currentYearTbms.filter((tbm) => {
                    const d = new Date(tbm.date);
                    return d >= weekStart && d < weekEnd;
                }).length;
                const latestUpdated = [...currentYearTbms]
                    .filter(t => t.updatedAt)
                    .sort((a, b) => String(b.updatedAt).localeCompare(String(a.updatedAt)))[0];

                return {
                    submittedDeptCount,
                    noActionRiskCount,
                    todayCount,
                    weekCount,
                    latestUpdated
                };
            }, [tbms, currentYear]);

            // NOTE: deptRankingData Removed as per request

            // New: Calculate Safety Score based on Risk Assessment Rate
            const safetyScore = useMemo(() => {
                if (stats.total === 0) return 0;
                return Math.round((stats.safeCount / stats.total) * 100);
            }, [stats]);

            const getScoreMessage = (score) => {
                if (stats.total === 0) return "데이터가 수집되지 않았습니다.";
                if (score >= 90) return "훌륭합니다! 현재 최고 수준의 안전 관리가 이루어지고 있습니다.";
                if (score >= 70) return "양호합니다. 지속적인 위험 요인 발굴과 관심이 필요합니다.";
                return "주의가 필요합니다. 위험성 평가 실시율을 높이고 안전 조치를 강화해주세요.";
            };

            return (
                <div className="space-y-6 animate-fade-in-up">
                    <div className="brand-shell brand-grid rounded-[2rem] p-6 sm:p-8 text-white shadow-[0_18px_40px_rgba(8,18,38,0.14)]">
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-4">
                            <div>
                                <div className="flex flex-wrap items-center gap-3 mb-3">
                                    <div className="brand-kicker !mb-0"><i className="fas fa-signal"></i> 안전 대시보드</div>
                                    <h2 className="display-title text-4xl font-extrabold tracking-tight leading-none">EHS 경영 대시보드</h2>
                                </div>
                                <p className="text-white/90 mt-2">실시간 안전 활동 현황을 한 화면에서 빠르게 파악합니다</p>
                            </div>
                            <div className="flex flex-wrap items-center gap-2 sm:gap-3">
                                 <select className="brand-select bg-slate-900/36 border border-white/28 text-white py-2 px-4 rounded-xl font-bold backdrop-blur" value={currentYear} onChange={(e) => setCurrentYear(e.target.value)}>

                        <KPICard title="참여 작업자 수" value={`${tbms.reduce((acc, cur) => acc + (cur.attendees?.length || 0), 0)}명`} icon="fa-users" color="bg-purple-500" subtext={`${currentYear}년 TBM 참석자 누적 합계`} />

                            <div className="text-2xl font-bold text-sky-900">{dashboardActions.todayCount}건</div>
