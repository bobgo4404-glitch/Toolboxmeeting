                        </div>
                        <div className="brand-stat-card p-5">
                            <div className="text-sm text-emerald-700 mb-2">이번주 등록</div>
                            <div className="text-2xl font-bold text-emerald-900">{dashboardActions.weekCount}건</div>
                            <div className="mt-2 text-xs text-emerald-700">이번 주 월요일부터 집계</div>
                        </div>
                        <div className="brand-stat-card p-5">
                            <div className="text-sm text-gray-500 mb-2">제출 부서 수</div>
                            <div className="text-2xl font-bold text-gray-800">{dashboardActions.submittedDeptCount}개 부서</div>
                            <div className="mt-2 text-xs text-gray-400">현재 연도에 1건 이상 제출한 부서 기준</div>
                        </div>
                        <div className="brand-stat-card p-5">
                            <div className="text-sm text-amber-700 mb-2">미조치 위험요인</div>
                            <div className="text-2xl font-bold text-amber-800">{dashboardActions.noActionRiskCount}건</div>
                            <div className="mt-2 text-xs text-amber-600">조치여부가 '아니오'인 항목 합계</div>
                        </div>
                    </div>

                    <div className="bg-gradient-to-r from-slate-900 via-slate-800 to-sky-800 text-white p-5 rounded-[1.6rem] shadow-[0_20px_44px_rgba(15,23,42,0.16)]">
                        <div className="text-sm text-blue-100 mb-2">운영 포커스</div>
                        {dashboardActions.latestUpdated ? (
                            <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
                                <div>
                                    <div className="text-lg font-bold">{dashboardActions.latestUpdated.workName || '-'}</div>
                                    <div className="text-sm text-blue-100 mt-1">{dashboardActions.latestUpdated.department} · {new Date(dashboardActions.latestUpdated.updatedAt).toLocaleString()} 최종 수정</div>
                                </div>
                                <div className="text-sm text-blue-50 bg-white/10 border border-white/10 rounded-xl px-4 py-2">
                                    {dashboardActions.noActionRiskCount > 0 ? '미조치 위험요인 확인이 우선입니다.' : '현재 미조치 위험요인은 없습니다.'}
                                </div>
                            </div>
                        ) : (
                            <div className="text-sm text-blue-100">최근 수정 이력이 없습니다.</div>
                        )}
                    </div>

                    {/* Row 2: Monthly Activity (Full Width for 12 months) */}
                    <div className="chart-panel">
                        <h3 className="chart-title">월별 TBM 활동 추이 (연간)</h3>
                        <SimpleBarChart data={stats.monthlyData} />
                    </div>

                    {/* Row 3: Safety Index & Risk Analysis */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        {/* Safety Index (Moved from Row 2) */}
                        <div className="chart-panel text-center">
                            <h3 className="chart-title">종합 안전 지수</h3>
                            <RiskGauge score={safetyScore} />
                            <div className="mt-4 p-3 bg-slate-50 rounded-xl text-left text-sm subtle-text">
                                <i className="fas fa-quote-left mr-2 text-gray-400"></i>
                                {getScoreMessage(safetyScore)}
                            </div>
                        </div>
                        {/* Risk Analysis (Kept here) */}
                        <div className="chart-panel">
                            <h3 className="chart-title">위험 요인 유형 분석</h3>
                            <DonutChart data={riskCategoryData} />
                        </div>
                    </div>
                </div>
            );
        };

        const ActionQueueView = ({ title, subtitle, items, emptyMessage, accent = 'sky', onEdit, onPdfDownload, user, setView }) => (
            <div className="tone-panel rounded-[1.6rem] animate-soft-float overflow-hidden">
                <SectionHero chip={<><i className="fas fa-bolt"></i> 실행형 메뉴</>} title={title} subtitle={subtitle} actions={<button onClick={() => setView('write')} className="px-4 py-2 rounded-xl bg-blue-600 text-white font-bold shadow-sm hover:bg-blue-700"><i className="fas fa-plus mr-1"></i> 신규 등록</button>} />
                <div className="p-6">
                    {items.length === 0 ? (
                        <div className="brand-stat-card p-8 text-center subtle-text">{emptyMessage}</div>
                    ) : (
                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
                            {items.map((tbm) => (
                                <div key={tbm.id || tbm.date} className="brand-stat-card p-5">
                                    <div className="flex items-start justify-between gap-3">
                                        <div>
                                            <div className="text-xs subtle-text">{tbm.department} · {tbm.date}</div>
                                            <div className="text-lg font-bold text-slate-900 mt-1">{tbm.workName || '작업명 없음'}</div>
                                            <div className="mt-2 text-sm subtle-text">리더: {tbm.leader || '-'}</div>
                                        </div>
                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${accent === 'rose' ? 'bg-rose-50 text-rose-700 border border-rose-200' : accent === 'amber' ? 'bg-amber-50 text-amber-700 border border-amber-200' : 'bg-sky-50 text-sky-700 border border-sky-200'}`}>{tbm.badge || '확인 필요'}</span>
                                    </div>
                                    {tbm.meta && <div className="mt-3 text-sm text-slate-700 whitespace-pre-wrap">{tbm.meta}</div>}
                                    <div className="mt-4 flex flex-wrap gap-2">
                                        {tbm.id && <button onClick={() => onEdit(tbm)} className="px-3 py-2 rounded-xl border border-indigo-200 text-indigo-600 bg-white hover:bg-indigo-50 font-bold text-sm">수정</button>}
                                        {!tbm.id && <button onClick={() => setView('write')} className="px-3 py-2 rounded-xl border border-amber-200 text-amber-700 bg-white hover:bg-amber-50 font-bold text-sm">이어쓰기</button>}
                                        {user?.role === 'master' && tbm.id && <button onClick={() => onPdfDownload(tbm)} className="px-3 py-2 rounded-xl border border-emerald-200 text-emerald-700 bg-white hover:bg-emerald-50 font-bold text-sm">PDF</button>}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            </div>
        );

        const ListView = ({ user, myTbms, setView, accounts, allTbms, currentYear, setCurrentYear, onEdit, onDelete, onPdfDownload, availableYears }) => {
            const [searchKeyword, setSearchKeyword] = useState('');
            const [quickPeriod, setQuickPeriod] = useState('year');
            const [selectedTbm, setSelectedTbm] = useState(null);

            const periodFilteredTbms = useMemo(() => {
                if (quickPeriod === 'year') return myTbms;
                const now = new Date();
                const todayStr = getLocalDateInputValue();
                if (quickPeriod === 'today') {
                    return myTbms.filter((tbm) => tbm.date === todayStr);
                }
                if (quickPeriod === 'month') {
                    const month = now.getMonth();
                    const year = now.getFullYear();
                    return myTbms.filter((tbm) => {
                        const d = new Date(tbm.date);
                        return d.getFullYear() === year && d.getMonth() === month;
                    });
                }
                if (quickPeriod === 'week') {
                    const day = now.getDay() || 7;
                    const weekStart = new Date(now);
                    weekStart.setHours(0, 0, 0, 0);
                    weekStart.setDate(now.getDate() - day + 1);
                    const weekEnd = new Date(weekStart);
                    weekEnd.setDate(weekStart.getDate() + 7);
                    return myTbms.filter((tbm) => {
                        const d = new Date(tbm.date);
                        return d >= weekStart && d < weekEnd;
                    });
                }
                return myTbms;
            }, [myTbms, quickPeriod]);

            const filteredTbms = useMemo(() => {
                const q = searchKeyword.trim().toLowerCase();
                if (!q) return periodFilteredTbms;
                return periodFilteredTbms.filter((tbm) =>
                    String(tbm.workName || '').toLowerCase().includes(q) ||
                    String(tbm.leader || '').toLowerCase().includes(q) ||
                    String(tbm.createdBy || '').toLowerCase().includes(q) ||
                    String(tbm.department || '').toLowerCase().includes(q)
                );
            }, [periodFilteredTbms, searchKeyword]);

            return (
                <div className="tone-panel rounded-[1.6rem] animate-soft-float overflow-hidden">
                    <div className="view-header">
                        <div className="view-header-primary">
                            <div className="hero-chip"><i className="fas fa-list-check"></i> 이력 조회</div>
                            <h2 className="view-title">TBM 이력 조회</h2>
                            <p className="view-subtitle">{user.role === 'master' ? '전사 통합 관리 모드' : `${user.department} 활동 내역`}</p>
                        </div>
                        <div className="flex w-full sm:w-auto gap-2">
                            <select className="bg-gray-50 border border-gray-300 text-gray-700 py-1 px-3 rounded shadow-sm w-full sm:w-auto" value={currentYear} onChange={(e) => setCurrentYear(e.target.value)}>
                                {availableYears.map(y => <option key={y} value={y}>{y}년</option>)}
                            </select>
                            <button onClick={() => setView('write')} className="bg-indigo-600 text-white px-4 py-2 rounded shadow hover:bg-indigo-700 text-sm whitespace-nowrap"><i className="fas fa-plus mr-1"></i> 신규 등록</button>
                        </div>
                    </div>
                    
                    {/* Weekly Status Panel (Sorted by Dept Name) */}
                    {user.role === 'master' && (
                        <div className="px-6 pt-6">
                            <WeeklyStatusPanel accounts={accounts} tbms={allTbms} currentYear={currentYear} />
                        </div>
                    )}

                    <div className="px-6 pb-4">
                        <div className="flex flex-wrap items-center gap-2 mb-3">
                            <button onClick={() => setQuickPeriod('today')} className={`px-2.5 py-1 text-xs rounded-full border ${quickPeriod === 'today' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300'}`}>오늘</button>
                            <button onClick={() => setQuickPeriod('week')} className={`px-2.5 py-1 text-xs rounded-full border ${quickPeriod === 'week' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300'}`}>이번주</button>
                            <button onClick={() => setQuickPeriod('month')} className={`px-2.5 py-1 text-xs rounded-full border ${quickPeriod === 'month' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300'}`}>이번달</button>
                            <button onClick={() => setQuickPeriod('year')} className={`px-2.5 py-1 text-xs rounded-full border ${quickPeriod === 'year' ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300'}`}>{currentYear}년</button>
                            <span className="muted-note ml-auto">총 {filteredTbms.length}건</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <i className="fas fa-search text-gray-400"></i>
                            <input
                                type="text"
                                className="input-field"
                                placeholder="작업명, 리더명, 부서명 검색"
                                value={searchKeyword}
                                onChange={(e) => setSearchKeyword(e.target.value)}
                            />
                            {searchKeyword && (
                                <button onClick={() => setSearchKeyword('')} className="shrink-0 px-3 py-2 text-sm border border-gray-300 rounded-lg bg-white text-gray-600 hover:bg-gray-50">
                                    초기화
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="hidden md:block overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr className="bg-gray-50 text-gray-500 text-sm uppercase tracking-wider">
                                    <th className="p-4 font-medium">기간 (주차)</th>
                                    <th className="p-4 font-medium">부서</th>
                                    <th className="p-4 font-medium">작업명</th>
                                    <th className="p-4 font-medium">리더</th>
                                    <th className="p-4 font-medium">최종수정</th>
                                    <th className="p-4 font-medium text-center">관리</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {filteredTbms.length === 0 ? (
                                    <tr><td colSpan="6" className="p-8 text-center text-gray-400">{currentYear}년도 등록된 TBM 내역이 없습니다.</td></tr>
                                ) : filteredTbms.map(tbm => (
                                    <tr key={tbm.id} className="hover:bg-gray-50 transition cursor-pointer" onClick={() => setSelectedTbm(tbm)}>
                                        <td className="p-4 text-sm text-gray-600 font-bold">{getFormattedWeek(tbm.date)}<div className="text-xs text-gray-400 font-normal">{tbm.date}</div></td>
                                        <td className="p-4 text-sm font-bold text-indigo-600">{tbm.department}</td>
                                        <td className="p-4 text-sm font-medium text-gray-800">{tbm.workName}</td>
                                        <td className="p-4 text-sm text-gray-600">{tbm.leader}</td>
                                        <td className="p-4 text-xs text-gray-500">{tbm.updatedAt ? new Date(tbm.updatedAt).toLocaleString() : '-'}</td>
                                        <td className="p-4 text-center">
                                            <div className="flex justify-center gap-2" onClick={(e) => e.stopPropagation()}>
                                                <button onClick={() => onEdit(tbm)} className="text-indigo-500 hover:bg-indigo-50 p-2 rounded text-xs border border-indigo-200"><i className="fas fa-edit"></i> 수정</button>
                                                <button onClick={() => onDelete(tbm.id)} className="text-red-500 hover:bg-red-50 p-2 rounded text-xs border border-red-200"><i className="fas fa-trash"></i> 삭제</button>
                                                {user.role === 'master' && (
                                                    <button onClick={() => onPdfDownload(tbm)} className="text-green-600 hover:bg-green-50 p-2 rounded text-xs border border-green-200"><i className="fas fa-file-pdf"></i> PDF</button>
                                                )}
                                            </div>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <div className="md:hidden p-4 space-y-3">
                        {filteredTbms.length === 0 ? (
                            <div className="p-4 text-center text-gray-400 border rounded-lg">{currentYear}년도 등록된 TBM 내역이 없습니다.</div>
                        ) : filteredTbms.map(tbm => (
                            <div key={tbm.id} className="border rounded-xl p-3 bg-white cursor-pointer shadow-sm animate-soft-float" onClick={() => setSelectedTbm(tbm)}>
                                <div className="text-sm font-bold text-gray-700">{getFormattedWeek(tbm.date)}</div>
                                <div className="text-xs text-gray-400 mb-2">{tbm.date}</div>
                                <div className="text-sm text-indigo-600 font-bold mb-1">{tbm.department}</div>
                                <div className="text-sm font-medium text-gray-800 mb-1">{tbm.workName}</div>
                                <div className="text-sm text-gray-600 mb-3">리더: {tbm.leader}</div>
                                <div className="text-xs text-gray-500 mb-3">최종수정: {tbm.updatedAt ? new Date(tbm.updatedAt).toLocaleString() : '-'}</div>
                                <div className="grid grid-cols-2 gap-2 sm:flex sm:flex-wrap" onClick={(e) => e.stopPropagation()}>
                                    <button onClick={() => onEdit(tbm)} className="text-indigo-500 hover:bg-indigo-50 px-3 py-2.5 rounded-xl text-sm border border-indigo-200 font-bold"><i className="fas fa-edit mr-1"></i>수정</button>
                                    <button onClick={() => onDelete(tbm.id)} className="text-red-500 hover:bg-red-50 px-3 py-2.5 rounded-xl text-sm border border-red-200 font-bold"><i className="fas fa-trash mr-1"></i>삭제</button>
                                    {user.role === 'master' && (
                                        <button onClick={() => onPdfDownload(tbm)} className="col-span-2 text-green-600 hover:bg-green-50 px-3 py-2.5 rounded-xl text-sm border border-green-200 font-bold"><i className="fas fa-file-pdf mr-1"></i>PDF</button>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>
                    {selectedTbm && (
                        <div className="fixed inset-0 z-50 bg-slate-950/45 backdrop-blur-sm flex items-end sm:items-center justify-center p-4" onClick={() => setSelectedTbm(null)}>
                            <div className="w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden max-h-[85dvh] flex flex-col animate-modal-rise" onClick={(e) => e.stopPropagation()}>
                                <div className="px-4 sm:px-5 py-4 border-b bg-slate-50 flex items-center justify-between">
                                    <div>
                                        <div className="text-xs text-slate-500">{selectedTbm.department} · {selectedTbm.date}</div>
                                        <div className="text-lg font-bold text-slate-800">{selectedTbm.workName || '-'}</div>
                                    </div>
                                    <button onClick={() => setSelectedTbm(null)} className="w-9 h-9 rounded-full border border-slate-200 text-slate-500 hover:bg-white">
                                        <i className="fas fa-times"></i>
                                    </button>
                                </div>
                                <div className="p-4 sm:p-5 space-y-4 overflow-y-auto">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 text-sm">
                                        <div className="rounded-xl bg-slate-50 p-3"><div className="text-slate-400 text-xs mb-1">리더</div><div className="font-bold text-slate-800">{selectedTbm.leader || '-'}</div></div>
                                        <div className="rounded-xl bg-slate-50 p-3"><div className="text-slate-400 text-xs mb-1">장소</div><div className="font-bold text-slate-800">{selectedTbm.location || '-'}</div></div>
                                        <div className="rounded-xl bg-slate-50 p-3"><div className="text-slate-400 text-xs mb-1">위험성평가</div><div className={`font-bold ${selectedTbm.riskAssessmentDone ? 'text-emerald-700' : 'text-rose-600'}`}>{selectedTbm.riskAssessmentDone ? '실시' : '미실시'}</div></div>
                                        <div className="rounded-xl bg-slate-50 p-3"><div className="text-slate-400 text-xs mb-1">참석자</div><div className="font-bold text-slate-800">{selectedTbm.attendees?.length || 0}명</div></div>
                                    </div>
                                    <div>
                                        <div className="text-xs font-bold text-slate-500 mb-2">작업 내용</div>
                                        <div className="rounded-xl border border-slate-200 p-3 text-sm text-slate-700 whitespace-pre-wrap min-h-20">{selectedTbm.workDesc || '내용 없음'}</div>
                                    </div>
                                    <div>
                                        <div className="text-xs font-bold text-slate-500 mb-2">주요 위험요인</div>
                                        <div className="flex flex-wrap gap-2">
                                            {(selectedTbm.risks || []).filter(r => String(r.factor || '').trim()).slice(0, 6).map((risk, idx) => (
                                                <span key={idx} className="px-3 py-1 rounded-full text-xs bg-amber-50 text-amber-800 border border-amber-200">{risk.factor}</span>
                                            ))}
                                            {(!selectedTbm.risks || selectedTbm.risks.filter(r => String(r.factor || '').trim()).length === 0) && (
                                                <span className="text-sm text-slate-400">등록된 위험요인이 없습니다.</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="px-4 sm:px-5 py-4 border-t bg-slate-50 grid grid-cols-2 sm:flex sm:flex-wrap sm:justify-end gap-2 sticky bottom-0">
                                    <button onClick={() => { setSelectedTbm(null); onEdit(selectedTbm); }} className="px-4 py-3 rounded-xl border border-indigo-200 text-indigo-600 bg-white hover:bg-indigo-50 font-bold">수정</button>
                                    <button onClick={() => { setSelectedTbm(null); onDelete(selectedTbm.id); }} className="px-4 py-3 rounded-xl border border-rose-200 text-rose-600 bg-white hover:bg-rose-50 font-bold">삭제</button>
                                    {user.role === 'master' && (
                                        <button onClick={() => onPdfDownload(selectedTbm)} className="col-span-2 px-4 py-3 rounded-xl border border-emerald-200 text-emerald-700 bg-white hover:bg-emerald-50 font-bold">PDF</button>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const AdminView = ({ user, accounts, showToast }) => {
            const [newAcc, setNewAcc] = useState({ username: '', password: '', department: '생산팀', role: 'user' });
            const [editingId, setEditingId] = useState(null);
            const [newPassword, setNewPassword] = useState('');

            if (user?.role !== 'master') {
                return (
                    <div className="tone-panel p-8 rounded-[1.6rem] text-center text-slate-500">
                        관리자 권한이 없어 계정 관리 화면에 접근할 수 없습니다.
                    </div>
                );
            }

            const handleCreateAccount = async () => {
                if (user?.role !== 'master') return showToast('관리자만 계정을 생성할 수 있습니다.', 'error');
                if(!newAcc.username || !newAcc.password) return showToast('정보를 입력하세요', 'error');
                try {
                    const passwordHash = await hashPassword(newAcc.password);
                    await addDoc(collection(db, "app_users"), {
                        username: newAcc.username.trim(),
                        department: newAcc.department.trim(),
                        role: newAcc.role,
                        passwordHash,
                        updatedAt: new Date().toISOString()
                    });
                    showToast('계정이 생성되었습니다.', 'success');
                    setNewAcc({ username: '', password: '', department: '생산팀', role: 'user' });
                } catch(e) { showToast('생성 실패', 'error'); }
            };
            const handleDeleteAccount = async (id) => {
                if (user?.role !== 'master') return showToast('관리자만 계정을 삭제할 수 있습니다.', 'error');
                if(confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, "app_users", id));
            };
            const handleUpdatePassword = async (id) => {
                if (user?.role !== 'master') return showToast('관리자만 비밀번호를 변경할 수 있습니다.', 'error');
                if(!newPassword) return;
                const passwordHash = await hashPassword(newPassword);
                await updateDoc(doc(db, "app_users", id), { passwordHash, updatedAt: new Date().toISOString() });
                showToast('비밀번호 변경 완료', 'success');
                setEditingId(null);
            };

            // Explicit sort for rendering
            const sortedAccounts = [...accounts].sort((a, b) => (a.department || '').localeCompare(b.department || '', 'ko'));

            return (
                <div className="space-y-6 animate-fade-in-up">
                    <div className="tone-panel rounded-[1.6rem] overflow-hidden">
                        <SectionHero chip={<><i className="fas fa-id-badge"></i> 계정 관리</>} title="계정 및 권한 관리" subtitle="사용자 계정 생성, 삭제, 비밀번호 재설정을 수행합니다" />
                    </div>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-1 tone-panel p-6 rounded-[1.6rem] h-fit">
                        <div className="hero-chip mb-3"><i className="fas fa-user-plus"></i> 계정 생성</div>
                        <h3 className="display-title text-2xl font-bold mb-4 text-slate-900">새 계정 생성</h3>
                        <div className="space-y-4">
                            <input type="text" className="input-field" placeholder="아이디" value={newAcc.username} onChange={e=>setNewAcc({...newAcc, username: e.target.value})} />
                            <input type="password" className="input-field" placeholder="비밀번호" value={newAcc.password} onChange={e=>setNewAcc({...newAcc, password: e.target.value})} />
                            <input type="text" className="input-field" placeholder="부서명" value={newAcc.department} onChange={e=>setNewAcc({...newAcc, department: e.target.value})} />
                            <select className="input-field" value={newAcc.role} onChange={e=>setNewAcc({...newAcc, role: e.target.value})}>
                                <option value="user">사용자</option>
                                <option value="master">관리자</option>
                            </select>
                            <button onClick={handleCreateAccount} className="w-full bg-gradient-to-r from-sky-700 to-cyan-600 text-white py-3 rounded-xl font-bold hover:brightness-105 transition shadow-sm">계정 생성</button>
                        </div>
                    </div>
                    <div className="lg:col-span-2 tone-panel p-6 rounded-[1.6rem]">
                        <h3 className="display-title text-2xl font-bold mb-4 text-slate-900">등록된 계정 목록</h3>
                        <p className="text-sm text-slate-500 mb-4">부서명 기준 가나다순으로 정렬됩니다.</p>
                        <div className="grid gap-3">
                            {sortedAccounts.map(acc => (
                                <div key={acc.id} className="flex flex-col sm:flex-row justify-between items-center p-4 border border-slate-200 rounded-2xl hover:bg-slate-50 gap-3 bg-white/85">
                                    <div className="flex-1"><span className="font-bold text-slate-800">{acc.department}</span> <span className="text-slate-500">({acc.username})</span></div>
                                    <div className="flex items-center gap-2">
                                        {editingId === acc.id ? (
                                            <div className="flex gap-1">
                                                <input type="password" className="border rounded px-2 py-1 text-sm w-32" value={newPassword} onChange={e=>setNewPassword(e.target.value)} />
                                                <button onClick={()=>handleUpdatePassword(acc.id)} className="bg-emerald-600 text-white px-3 py-1.5 rounded-xl text-xs font-bold">저장</button>
                                                <button onClick={()=>{setEditingId(null); setNewPassword('')}} className="bg-slate-300 text-white px-3 py-1.5 rounded-xl text-xs font-bold">취소</button>
                                            </div>
                                        ) : <button onClick={()=>{setEditingId(acc.id); setNewPassword('')}} className="text-sky-700 border border-sky-200 px-3 py-2 rounded-xl text-sm font-bold bg-white">비번변경</button>}
                                        <button onClick={() => handleDeleteAccount(acc.id)} className="text-rose-500 border border-rose-200 px-3 py-2 rounded-xl text-sm font-bold bg-white">삭제</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    </div>
                </div>
            );
        };

        const TBMFormView = ({ user, setView, showToast, setLoading, initialData }) => {
            const [form, setForm] = useState(initialData || {
                date: getLocalDateInputValue(),
                startTime: '09:00',
                endTime: '18:00',
                temperature: '',
                humidity: '',
                workName: '',
                workDesc: '',
                location: '',
                riskAssessmentDone: false,
                risks: [{ id: 1, factor: '', measure: '', result: 'yes', action: '' }],
                keyRiskId: '',
                leader: user.username,
                preChecks: { check1: false, check2: false, check3: false },
                safetyActionChecks: [],
                preJobBriefingDone: true,
                preJobBriefingAction: '',
                dailyCheckResult: '특이사항 없음',
                photoUrl: '',
                attendees: [{ name: user.username || '', signed: false, signatureUrl: '', isLeader: true }]
            });
            const [showSignModal, setShowSignModal] = useState(false);
            const [currentSignerIndex, setCurrentSignerIndex] = useState(null);
            const [submitting, setSubmitting] = useState(false);
            const [showCopyOptions, setShowCopyOptions] = useState(false);
            const [copyOptions, setCopyOptions] = useState({
                overview: true,
                risks: true,
                checks: true,
                attendees: false
            });
            const [autoSaveState, setAutoSaveState] = useState('idle');
            const [lastAutoSavedAt, setLastAutoSavedAt] = useState('');
            const [draftRestored, setDraftRestored] = useState(false);
            const [didAutoLoadPrevious, setDidAutoLoadPrevious] = useState(false);
            const [validationErrors, setValidationErrors] = useState([]);
            const [sectionOpen, setSectionOpen] = useState({
                overview: true,
                risks: false,
                checks: false,
                attendees: false
            });
            const workNameRef = useRef(null);
            const locationRef = useRef(null);
            const leaderNameRef = useRef(null);
            const leaderSignatureRef = useRef(null);
            const briefingDoneRef = useRef(null);
            const briefingActionRef = useRef(null);
            const draftKey = `tbm_draft_${user.department}`;
            const requiredCompletedCount = useMemo(() => {
                const leader = (form.attendees || []).find(att => att.isLeader);
                return [
                    !!form.workName?.trim(),
                    !!form.location?.trim(),
                    !!leader?.name?.trim(),
                    !!leader?.signatureUrl
                ].filter(Boolean).length;
            }, [form]);
            const progressPercent = Math.round((requiredCompletedCount / 4) * 100);
            const isReadyToSave = requiredCompletedCount === 4;

            useEffect(() => {
                if (initialData) return;
                const raw = localStorage.getItem(draftKey);
                if (!raw) return;
                try {
                    const saved = JSON.parse(raw);
                    setForm(prev => ({ ...prev, ...saved }));
                    setDraftRestored(true);
                    showToast("이전에 작성 중이던 내용을 불러왔습니다.", "info");
                } catch (err) {
                    console.warn("임시저장 데이터 파싱 실패:", err);
                }
            }, []);

            useEffect(() => {
                if (initialData) return;
                setAutoSaveState('saving');
                const timer = setTimeout(() => {
                    try {
                        localStorage.setItem(draftKey, JSON.stringify(form));
                        setAutoSaveState('saved');
                        setLastAutoSavedAt(new Date().toLocaleTimeString());
                    } catch (err) {
                        console.warn("임시저장 실패:", err);
                        setAutoSaveState('error');
                    }
                }, 900);
                return () => clearTimeout(timer);
            }, [form, initialData]);

            const toggleSection = (key) => {
                setSectionOpen((prev) => ({ ...prev, [key]: !prev[key] }));
            };

            const addRiskRow = () => setForm(p => ({...p, risks: [...p.risks, { id: Date.now(), factor: '', measure: '', result: 'yes', action: '' }]}));
            const updateRisk = (id, f, v) => setForm(p => ({...p, risks: p.risks.map(r => r.id===id ? {...r, [f]: v} : r)}));
            const removeRisk = (id) => setForm(p => ({...p, risks: p.risks.filter(r => r.id !== id)}));
            const duplicateRiskRow = (id) => {
                setForm((prev) => {
                    const idx = prev.risks.findIndex((r) => r.id === id);
                    if (idx < 0) return prev;
                    const source = prev.risks[idx];
                    const copy = { ...source, id: Date.now() + Math.floor(Math.random() * 1000) };
                    const next = [...prev.risks];
                    next.splice(idx + 1, 0, copy);
                    return { ...prev, risks: next };
                });
            };
            const addAttendee = () => setForm(p => ({...p, attendees: [...p.attendees, { name: '', signed: false, signatureUrl: '', isLeader: false }]}));

            const removeAttendee = (idx) => {
                const newAtt = form.attendees.filter((_, i) => i !== idx);
                setForm({ ...form, attendees: newAtt });
                if (currentSignerIndex !== null) {
                    if (currentSignerIndex === idx) {
                        setShowSignModal(false);
                        setCurrentSignerIndex(null);
                    } else if (currentSignerIndex > idx) {
                        setCurrentSignerIndex(currentSignerIndex - 1);
                    }
                }
            };

            const updateAttendee = (idx, name) => {
                const newAtt = [...form.attendees];
                newAtt[idx].name = name;
                setForm({...form, attendees: newAtt});
            };
            const openSignModal = (idx) => {
                if (!form.attendees[idx].name) return showToast("이름을 먼저 입력하세요.", "error");
                if (!form.attendees[idx].isLeader) return showToast("참석자는 대표자 확인으로 서명을 생략합니다.", "info");
                setCurrentSignerIndex(idx);
                setShowSignModal(true);
            };
            const handleSaveSignature = (dataUrl) => {
                if (currentSignerIndex === null || !form.attendees[currentSignerIndex]) {
                    showToast('서명 대상 참석자를 다시 선택해 주세요.', 'error');
                    setShowSignModal(false);
                    setCurrentSignerIndex(null);
                    return;
                }
                const newAtt = [...form.attendees];
                newAtt[currentSignerIndex].signed = true;
                newAtt[currentSignerIndex].signatureUrl = dataUrl;
                setForm({ ...form, attendees: newAtt });
                setCurrentSignerIndex(null);
            };

            const buildSafetyActionChecksFromRisks = (risks) => {
                return (risks || [])
                    .filter(r => String(r.factor || '').trim() !== '')
                    .map(r => ({
                        risk: r.factor,
                        result: r.result || 'yes',
                        action: r.result === 'no' ? (r.action || '') : ''
                    }));
            };
            const applyQuickDefaults = () => {
                setForm((cur) => ({
                    ...cur,
                    temperature: cur.temperature || '25',
                    humidity: cur.humidity || '50',
                    dailyCheckResult: cur.dailyCheckResult || '특이사항 없음',
                    preChecks: { check1: true, check2: true, check3: true }
                }));
                showToast("기본값을 빠르게 입력했습니다.", "success");
            };
            const fillNoIssueTemplate = () => {
                setForm((cur) => ({
                    ...cur,
                    workDesc: cur.workDesc || '금일 작업 전 TBM 시행, 특이사항 없음.',
                    dailyCheckResult: '특이사항 없음'
                }));
                showToast("무특이 템플릿을 적용했습니다.", "info");
            };
            const toggleCopyOption = (key) => {
                setCopyOptions((prev) => ({ ...prev, [key]: !prev[key] }));
            };
            const normalizeAttendees = (arr) => {
                const next = (arr || []).map((a) => ({
                    name: a.name || '',
                    signed: !!a.signed,
                    signatureUrl: a.signatureUrl || '',
                    isLeader: !!a.isLeader
                }));
                if (!next.length) {
                    return [{ name: user.username || '', signed: false, signatureUrl: '', isLeader: true }];
                }
                next[0].isLeader = true;
                for (let i = 1; i < next.length; i++) next[i].isLeader = false;
                return next;
            };

            const handleLoadPrevious = async (opts = {}) => {
                const { silent = false } = opts;
                try {
                    setLoading(true);
                    const q = query(
                        collection(db, "global_tbm_data"),
                        where("department", "==", user.department)
                    );
                    const snap = await getDocs(q);
                    const prev = snap.docs
                        .map(d => ({ id: d.id, ...d.data() }))
                        .sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')))
                        .find(d => !initialData || d.id !== initialData.id);

                    if (!prev) {
                        if (!silent) showToast("복사할 이전 TBM 데이터가 없습니다.", "info");
                        return;
                    }

                    const legacyActionMap = {};
                    (prev.safetyActionChecks || []).forEach((a) => {
                        if (!a?.risk) return;
                        legacyActionMap[a.risk] = { result: a.result || 'yes', action: a.action || '' };
                    });
                    const copiedRisks = (prev.risks || [{ factor: '', measure: '' }]).map((r, i) => {
                        const legacy = legacyActionMap[r.factor] || {};
                        return {
                            id: Date.now() + i,
                            factor: r.factor || '',
                            measure: r.measure || '',
                            result: r.result || legacy.result || 'yes',
                            action: r.action || legacy.action || ''
                        };
                    });

                    setForm((cur) => ({
                        ...cur,
                        ...(copyOptions.overview ? {
                            workName: prev.workName || '',
                            workDesc: prev.workDesc || '',
                            location: prev.location || ''
                        } : {}),
                        ...(copyOptions.risks ? {
                            riskAssessmentDone: !!prev.riskAssessmentDone,
                            risks: copiedRisks,
                            keyRiskId: ''
                        } : {}),
                        ...(copyOptions.checks ? {
                            preChecks: prev.preChecks || { check1: false, check2: false, check3: false },
                            preJobBriefingDone: prev.preJobBriefingDone ?? true,
                            preJobBriefingAction: prev.preJobBriefingAction || '',
                            dailyCheckResult: prev.dailyCheckResult || '특이사항 없음'
                        } : {}),
                        ...(copyOptions.attendees ? {
                            attendees: normalizeAttendees(prev.attendees)
                        } : {
                            attendees: normalizeAttendees(cur.attendees)
                        })
                    }));
                    if (!silent) showToast("전주 주요 내용을 복사했습니다. 날짜/시간만 확인 후 저장하세요.", "success");
                } catch (err) {
                    console.error("전주 내용 복사 실패:", err);
                    if (!silent) showToast("이전 데이터 복사 중 오류가 발생했습니다.", "error");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (initialData || draftRestored || didAutoLoadPrevious) return;
                setDidAutoLoadPrevious(true);
                handleLoadPrevious({ silent: true });
            }, [initialData, draftRestored, didAutoLoadPrevious]);

            const compressImageFile = (file) => new Promise((resolve, reject) => {
                const img = new Image();
                const blobUrl = URL.createObjectURL(file);
                img.onload = () => {
                    const maxWidth = 1600;
                    const ratio = Math.min(1, maxWidth / img.width);
                    const canvas = document.createElement('canvas');
                    canvas.width = Math.round(img.width * ratio);
                    canvas.height = Math.round(img.height * ratio);
                    const ctx = canvas.getContext('2d');
                    if (!ctx) {
                        URL.revokeObjectURL(blobUrl);
                        reject(new Error('canvas context unavailable'));
                        return;
                    }
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.82);
                    URL.revokeObjectURL(blobUrl);
                    resolve(dataUrl);
                };
                img.onerror = () => {
                    URL.revokeObjectURL(blobUrl);
                    reject(new Error('image load failed'));
                };
                img.src = blobUrl;
            });

            const handlePhotoUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                try {
                    const compressed = await compressImageFile(file);
                    setForm(prev => ({...prev, photoUrl: compressed}));
                    showToast('사진을 최적화해서 첨부했습니다.', 'success');
                } catch (err) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setForm(prev => ({...prev, photoUrl: reader.result}));
                    };
                    reader.readAsDataURL(file);
                }
            };

            const scrollToErrorField = (key) => {
                const map = {
                    workName: workNameRef,
                    location: locationRef,
                    leaderName: leaderNameRef,
                    leaderSignature: leaderSignatureRef,
                    briefingDone: briefingDoneRef,
                    briefingAction: briefingActionRef
                };
                const target = map[key]?.current;
                if (!target) return;
                setTimeout(() => target.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
            };

            const handleSubmit = async () => {
                if (submitting) return;
                const nextErrors = [];
                if (!form.workName?.trim()) nextErrors.push({ key: 'workName', label: '작업명' });
                if (!form.location?.trim()) nextErrors.push({ key: 'location', label: '장소' });
                if (form.preJobBriefingDone === false && !String(form.preJobBriefingAction || '').trim()) {
                    nextErrors.push({ key: 'briefingAction', label: '작업 전 공유/교육 미실시 사유+즉시조치' });
                }
                const leader = (form.attendees || []).find(att => att.isLeader);
                if (!leader || !leader.name?.trim()) nextErrors.push({ key: 'leaderName', label: '리더 이름' });
                if (!leader?.signatureUrl) nextErrors.push({ key: 'leaderSignature', label: '리더 서명' });

                if (nextErrors.length) {
                    setValidationErrors(nextErrors);
                    setSectionOpen((prev) => ({ ...prev, overview: true, checks: true, attendees: true }));
                    showToast(`필수 입력 누락: ${nextErrors.map((e) => e.label).join(', ')}`, "info");
                    scrollToErrorField(nextErrors[0].key);
                    return;
                }
                setValidationErrors([]);
                setSubmitting(true);
                setLoading(true);
                try {
                    const selectedRisk = form.risks.find(r => r.id == form.keyRiskId);
                    const normalizedRisks = (form.risks || []).map((r) => ({
                        ...r,
                        result: r.result || 'yes',
                        action: (r.result || 'yes') === 'no' ? (r.action || '') : ''
                    }));
                    const docData = {
                        ...form,
                        risks: normalizedRisks,
                        safetyActionChecks: buildSafetyActionChecksFromRisks(normalizedRisks),
                        department: user.department,
                        keyRiskFactor: selectedRisk ? selectedRisk.factor : 'N/A',
                        keyRiskMeasure: selectedRisk ? selectedRisk.measure : 'N/A',
                        updatedAt: new Date().toISOString()
                    };
                    if (!initialData) {
                        docData.createdBy = user.username;
                        docData.createdAt = new Date().toISOString();
                        await addDoc(collection(db, "global_tbm_data"), docData);
                        showToast("등록 완료", "success");
                    } else {
                        await updateDoc(doc(db, "global_tbm_data", initialData.id), docData);
                        showToast("수정 완료", "success");
                    }
                    if (!initialData) localStorage.removeItem(draftKey);
                    setView('list');
                } catch (err) {
                    showToast("오류 발생", "error");
                }
                setLoading(false);
                setSubmitting(false);
            };

            const renderSectionTitle = (key, title, tone = 'gray') => {
                const toneClass = tone === 'yellow' ? 'text-yellow-800 border-yellow-200 bg-yellow-50' : 'text-gray-700 border-gray-200 bg-gray-50';
                return (
                    <button type="button" onClick={() => toggleSection(key)} className={`w-full flex items-center justify-between p-3 rounded-lg border ${toneClass}`}>
                        <span className="font-bold">{title}</span>
                        <i className={`fas fa-chevron-${sectionOpen[key] ? 'up' : 'down'} text-xs`}></i>
                    </button>
                );
            };

            return (
                <div className="tone-panel rounded-[1.75rem] overflow-hidden w-full animate-fade-in-up">
                    <div className="brand-shell brand-grid text-white p-6 sm:p-8 flex justify-between items-start">
                        <div>
                            <div className="brand-kicker mb-2"><i className="fas fa-pen-ruler"></i> TBM 작업공간</div>
                            <h2 className="display-title text-3xl font-extrabold tracking-tight"><i className="fas fa-edit mr-2"></i>{initialData ? "TBM 수정" : "TBM 등록"}</h2>
                            <p className="text-white/80 mt-3 text-sm">작업 개요, 위험요인, 참석자 정보를 단계별로 입력합니다.</p>
                        </div>
                        <span className="text-sm brand-outline px-3 py-1.5 rounded-full">{user.department}</span>
                    </div>
                    <div className="p-4 sm:p-6 md:p-8 space-y-5">
                        <div className="brand-stat-card p-4 flex flex-col sm:flex-row sm:items-center justify-between gap-3 relative">
                            <div className="text-sm text-indigo-950">
                                필수 입력: <span className="font-bold">작업명·장소·리더서명</span>만 완료 후 저장 가능
                                <span className="ml-2 text-indigo-700">임시저장 상태: {autoSaveState === 'saving' ? '저장 중...' : autoSaveState === 'saved' ? `저장됨 · ${lastAutoSavedAt}` : autoSaveState === 'error' ? '실패' : '-'}</span>
                            </div>
                            <div className="flex flex-wrap gap-2">
                                <span className={`shrink-0 px-2.5 py-1.5 rounded-lg text-xs font-bold border ${isReadyToSave ? 'bg-emerald-100 text-emerald-700 border-emerald-200' : 'bg-amber-100 text-amber-800 border-amber-200'}`}>
                                    {isReadyToSave ? '저장 가능' : '필수항목 확인 필요'}
                                </span>

                                                <label className="flex items-center gap-2"><input type="checkbox" checked={copyOptions.checks} onChange={()=>toggleCopyOption('checks')} />점검결과</label>
                                                <label className="flex items-center gap-2"><input type="checkbox" checked={copyOptions.attendees} onChange={()=>toggleCopyOption('attendees')} />참석자</label>

                                </div>
                            </div>
                            <div className="brand-stat-card p-3">
                                <div className="text-xs text-yellow-700 mb-1">위험요인</div>
                                <div className="text-xl font-bold text-yellow-900">{(form.risks || []).filter(r => String(r.factor || '').trim()).length}건</div>
                                <div className="mt-1 muted-note text-yellow-800">입력된 잠재위험 기준</div>
                            </div>
                            <div className="brand-stat-card p-3">
                                <div className="text-xs text-emerald-700 mb-1">점검 상태</div>
                                <div className="text-xl font-bold text-emerald-900">{Object.values(form.preChecks || {}).filter(Boolean).length}/3</div>
                                <div className="mt-1 muted-note text-emerald-800">체크리스트 완료 수</div>
                            </div>
                            <div className="brand-stat-card p-3">
                                <div className="text-xs text-violet-700 mb-1">참석자 기록</div>
                                <div className="text-xl font-bold text-violet-900">{form.attendees.length}명</div>
                                <div className="mt-1 muted-note text-violet-800">리더 1명 서명 필수</div>
                            </div>
                        </div>

                        {validationErrors.length > 0 && (
                            <div className="border border-red-200 bg-red-50 rounded-lg p-3 text-sm text-red-700">
                                <div className="font-bold mb-1">입력 확인 필요</div>
                                <div>{validationErrors.map((e) => e.label).join(', ')}</div>
                            </div>
                        )}

                        <section className="space-y-3">
                            {renderSectionTitle('overview', '1. 작업 개요')}

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 border border-gray-100 rounded-lg p-4">
                                    <div>
                                        <label className="label-text">일시</label>
                                        <div className="flex gap-2 items-center flex-wrap">
                                            <input type="date" className="input-field flex-grow" value={form.date} onChange={e=>setForm({...form, date:e.target.value})} />

                                                <input type="time" className="input-field w-24" value={form.startTime} onChange={e=>setForm({...form, startTime:e.target.value})} />

                                                <input type="time" className="input-field w-24" value={form.endTime} onChange={e=>setForm({...form, endTime:e.target.value})} />
                                            </div>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="label-text">장소</label>
                                        <input ref={locationRef} type="text" className="input-field" value={form.location} onChange={e=>setForm({...form, location:e.target.value})} />
                                    </div>
                                    <div className="flex gap-4 md:col-span-2">
                                        <div className="flex-1">
                                            <label className="label-text">온도 (℃)</label>
                                            <input type="number" inputMode="numeric" className="input-field" placeholder="예: 25" value={form.temperature} onChange={e=>setForm({...form, temperature:e.target.value})} />
                                        </div>
                                        <div className="flex-1">
                                            <label className="label-text">습도 (%)</label>
                                            <input type="number" inputMode="numeric" className="input-field" placeholder="예: 50" value={form.humidity} onChange={e=>setForm({...form, humidity:e.target.value})} />
                                        </div>
                                    </div>
                                    <div className="md:col-span-2"><label className="label-text">작업명</label><input ref={workNameRef} type="text" className="input-field" value={form.workName} onChange={e=>setForm({...form, workName:e.target.value})} /></div>
                                    <div className="md:col-span-2">
                                        <label className="label-text flex items-center justify-between">내용 <i className="fas fa-microphone text-gray-400 hover:text-indigo-500 cursor-pointer" title="음성 입력 (지원 예정)"></i></label>
                                        <textarea className="input-field h-20" value={form.workDesc} onChange={e=>setForm({...form, workDesc:e.target.value})}></textarea>
                                    </div>
                                </div>
